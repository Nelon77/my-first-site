<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🧐 AI 키워드 검색·분석기</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
  margin:0;
  background:#0f1115;
  color:white;
  font-family:Pretendard,sans-serif;
}

.container{
  max-width:1100px;
  margin:50px auto;
  padding:20px;
}

/* HEADER */
h1{
  text-align:center;
  margin-bottom:10px;
}

.subtitle{
  text-align:center;
  color:#aaa;
  margin-bottom:30px;
}

/* INPUT */
.search-box{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

input{
  flex:1;
  padding:14px;
  border-radius:10px;
  border:none;
  background:#1a1d25;
  color:white;
  font-weight:700;
}

button{
  padding:14px 20px;
  border:none;
  border-radius:10px;
  background:#0072ff;
  color:white;
  cursor:pointer;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

/* CARD */
.card{
  background:#1a1d25;
  padding:18px;
  border-radius:14px;
  margin-top:15px;
}

/* GAUGE */
.bar{
  width:100%;
  height:12px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  transition:0.3s;
}

/* OUTPUT (리포트형 복구 핵심) */
.output{
  white-space:pre-wrap;
  line-height:1.7;
  min-height:150px;
  font-size:14px;
}

/* CHART */
canvas{
  width:100% !important;
  max-height:300px;
}

.badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:8px;
  font-weight:900;
  margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

  <!-- TITLE -->
  <h1>🧐 AI 키워드 검색·분석기</h1>
  <p class="subtitle">리포트 + 대시보드 통합 AI 분석 시스템</p>

  <!-- INPUT -->
  <div class="search-box">
    <input id="keyword" placeholder="키워드 입력 (예: 원룸, 아이폰, 코인)" />
    <button onclick="startSearch()">분석</button>
  </div>

  <!-- DASHBOARD -->
  <div class="grid">

    <div class="card">
      <h3>🔥 경쟁도</h3>
      <div class="bar"><div id="competitionBar" class="fill"></div></div>
      <p id="competitionText">0</p>
    </div>

    <div class="card">
      <h3>📈 트렌드</h3>
      <div class="bar"><div id="trendBar" class="fill"></div></div>
      <p id="trendText">0</p>
    </div>

  </div>

  <!-- CHARTS -->
  <div class="card">
    <h3>📊 핵심 지표 비교</h3>
    <canvas id="chart1"></canvas>
  </div>

  <div class="card">
    <h3>📊 시장 구조 분석</h3>
    <canvas id="chart2"></canvas>
  </div>

  <!-- REPORT (🔥 기존 감성 복구) -->
  <div class="card">
    <h3>🧠 AI 리포트 분석</h3>
    <div id="output" class="output"></div>
  </div>

</div>

<script>

let chart1, chart2;

/* 색상 */
function getColor(v){
  if(v >= 80) return "#ff3b3b";
  if(v >= 50) return "#ffb020";
  return "#2ecc71";
}

/* 게이지 */
function animateGauge(id, textId, value){
  let current = 0;

  const bar = document.getElementById(id);
  const text = document.getElementById(textId);

  const timer = setInterval(()=>{
    current += 2;

    if(current >= value){
      current = value;
      clearInterval(timer);
    }

    bar.style.width = current + "%";
    bar.style.background = getColor(current);
    text.innerText = current;
  }, 15);
}

/* CHART 1 */
function renderChart1(meta){

  const ctx = document.getElementById("chart1");

  if(chart1) chart1.destroy();

  chart1 = new Chart(ctx,{
    type:"bar",
    data:{
      labels:["경쟁도","트렌드"],
      datasets:[{
        label:"점수",
        data:[meta.competition, meta.trendScore],
        backgroundColor:["#ff3b3b","#2ecc71"]
      }]
    }
  });
}

/* CHART 2 */
function renderChart2(){

  const ctx = document.getElementById("chart2");

  if(chart2) chart2.destroy();

  chart2 = new Chart(ctx,{
    type:"bar",
    data:{
      labels:["검색수요","경쟁강도","성장성","진입난이도"],
      datasets:[{
        label:"시장 구조",
        data:[92,90,88,70],
        backgroundColor:"#0072ff"
      }]
    }
  });
}

/* MAIN */
function startSearch(){

  const keyword = document.getElementById("keyword").value;

  if(!keyword) return alert("키워드를 입력하세요");

  document.getElementById("output").innerText = "";

  const eventSource = new EventSource(
    `/api/analyze?keyword=${encodeURIComponent(keyword)}`
  );

  eventSource.onmessage = (event)=>{

    const data = JSON.parse(event.data);

    /* META */
    if(data.type === "meta"){
      animateGauge("competitionBar","competitionText",data.data.competition);
      animateGauge("trendBar","trendText",data.data.trendScore);

      renderChart1(data.data);
      renderChart2();

      /* 🔥 리포트 상단 배지 */
      document.getElementById("output").innerHTML =
        `<div class="badge" style="background:${getColor(data.data.competition)}">
          경쟁도 ${data.data.competition} / 트렌드 ${data.data.trendScore}
        </div>\n\n`;
    }

    /* STREAM TEXT (리포트 복구 핵심) */
    if(data.type === "chunk"){
      document.getElementById("output").innerText += data.data;
    }

    /* ERROR */
    if(data.type === "error"){
      document.getElementById("output").innerText =
        "⚠️ " + data.message;
    }

    if(data.type === "done"){
      eventSource.close();
    }
  };

  eventSource.onerror = ()=>{
    document.getElementById("output").innerText =
      "⚠️ 서버 연결 실패";
    eventSource.close();
  };
}

</script>

</body>
</html>
