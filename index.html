<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🧐 AI 키워드 검색·분석기</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>

body{
  margin:0;
  background:#0f1115;
  color:white;
  font-family:Pretendard, sans-serif;
}

.container{
  max-width:1000px;
  margin:50px auto;
  padding:20px;
}

h1{text-align:center;}

.subtitle{
  text-align:center;
  color:#aaa;
  margin-bottom:30px;
}

.search-box{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

input{
  flex:1;
  padding:18px;
  border-radius:12px;
  border:none;
  background:#1a1d25;
  color:white;
  font-weight:900;
  font-size:20px;
  text-align:center;
}

button{
  padding:14px 20px;
  border:none;
  border-radius:10px;
  background:#0072ff;
  color:white;
  cursor:pointer;
}

/* CARD */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  display:none;
}

.card{
  background:#1a1d25;
  padding:18px;
  border-radius:14px;
  margin-top:15px;
  display:none;
}

.bar{
  width:100%;
  height:12px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  transition:0.3s;
}

/* 🔥 리포트 스타일 */
.report-box{
  line-height:1.7;
  font-size:15px;
}

/* 파란 강조 */
.blue{
  color:#3b82f6;
  font-weight:800;
}

.small{
  opacity:0.8;
  font-size:14px;
}

</style>
</head>

<body>

<div class="container">

  <h1>🧐 AI 키워드 검색·분석기</h1>

  <p class="subtitle">
    최근 7일간 뉴스·SNS·커뮤니티 데이터를 AI가 분석합니다.
  </p>

  <div class="search-box">
    <input id="keyword" placeholder="키워드 입력" />
    <button onclick="startSearch()">분석</button>
  </div>

  <!-- DASHBOARD -->
  <div class="grid" id="dashboard">

    <div class="card">
      <h3>🔥 경쟁도</h3>
      <div class="bar"><div id="competitionBar" class="fill"></div></div>
      <p id="competitionText">0</p>
    </div>

    <div class="card">
      <h3>📈 트렌드</h3>
      <div class="bar"><div id="trendBar" class="fill"></div></div>
      <p id="trendText">0</p>
    </div>

  </div>

  <!-- INTERNET -->
  <div class="card" id="hotCard">
    <h3>📊 인터넷 화제성</h3>
    <div id="hotTopic"></div>
  </div>

  <!-- MARKET -->
  <div class="card" id="marketCard">
    <h3>📊 시장 구조 분석</h3>
    <div id="marketAnalysis"></div>
  </div>

  <!-- REPORT -->
  <div class="card" id="reportCard">
    <h3>🧠 AI 리포트</h3>
    <div id="report" class="report-box"></div>
  </div>

</div>

<script>

function animate(barId,textId,value){
  let cur=0;
  const bar=document.getElementById(barId);
  const text=document.getElementById(textId);

  const t=setInterval(()=>{
    cur+=2;
    if(cur>=value){cur=value;clearInterval(t);}
    bar.style.width=cur+"%";
    text.innerText=cur;
  },15);
}

function renderReport(data){

  const keyword = data.keyword;
  const intensity = data.intensity;
  const competition = data.competition;
  const trend = data.trendScore;
  const news = data.newsCount;

  document.getElementById("report").innerHTML = `
    <div class="small">키워드 분석 결과</div>

    <h2><span class="blue">${keyword}</span> 분석 리포트</h2>

    <p>
      현재 <span class="blue">${keyword}</span>는
      <span class="blue">${intensity}</span> 구간에 위치해 있으며,
      시장 반응은 <span class="blue">${competition >= 75 ? "강한 편" : "중간 수준"}</span>입니다.
    </p>

    <p>
      트렌드 점수는 <span class="blue">${trend}</span>으로
      ${trend > 70 ? "확산 속도가 빠르게 증가하는 흐름" : "완만한 변화 흐름"}을 보이고 있습니다.
    </p>

    <p>
      최근 <span class="blue">${news}</span>개의 데이터가 확인되었으며,
      이는 해당 키워드가 <span class="blue">${trend > 70 ? "주목 단계" : "관찰 단계"}</span>임을 의미합니다.
    </p>
  `;
}

async function startSearch(){

  const keyword=document.getElementById("keyword").value;
  if(!keyword) return alert("키워드 입력");

  document.getElementById("dashboard").style.display="grid";
  document.getElementById("hotCard").style.display="block";
  document.getElementById("marketCard").style.display="block";
  document.getElementById("reportCard").style.display="block";

  document.getElementById("hotTopic").innerText="분석 중...";
  document.getElementById("marketAnalysis").innerText="분석 중...";
  document.getElementById("report").innerText="분석 중...";

  try{

    const res = await fetch(`/api/analyze?keyword=${encodeURIComponent(keyword)}`);
    const data = await res.json();

    animate("competitionBar","competitionText",data.meta.competition);
    animate("trendBar","trendText",data.meta.trendScore);

    document.getElementById("hotTopic").innerText = data.hotTopic;
    document.getElementById("marketAnalysis").innerText = data.marketAnalysis;

    renderReport(data.report);

  } catch(e){
    document.getElementById("report").innerText="⚠️ 오류 발생";
  }
}

</script>

</body>
</html>
