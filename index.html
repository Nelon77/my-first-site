<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🧐 AI 트렌드 브리핑</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>

body {
  margin:0;
  background:#121212;
  color:white;
  font-family:Pretendard;
  font-size:18px;
}

.container {
  max-width:1100px;
  margin:80px auto;
  padding:30px;
}

h1 {
  text-align:center;
  font-size:2.8rem;
  margin-bottom:35px;
}

.card {
  background:white;
  color:#222;
  padding:45px;
  border-radius:25px;
}

/* 검색 */
.search-box {
  display:flex;
  gap:15px;
}

input {
  flex:1;
  padding:20px;
  font-size:18px;
  border-radius:12px;
  background:#1f1f1f;
  color:white;
  border:none;

  text-align:center;
  font-weight:700;
}

input::placeholder {
  color:#888;
  font-weight:500;
  text-align:center;
}

/* 버튼 */
button {
  padding:20px 28px;
  font-size:18px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

button:active {
  transform:scale(0.95);
}

/* 배지 */
.badge {
  display:inline-block;
  padding:8px 12px;
  border-radius:10px;
  color:white;
  font-weight:bold;
  margin-right:8px;
}

.low { background:#16a34a; }
.mid { background:#facc15; color:black; }
.high { background:#ef4444; }

/* 게이지 */
.meter {
  height:16px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  margin-top:14px;
}

.bar {
  height:100%;
  transition:0.5s;
}

/* 섹션 */
.section {
  margin-top:25px;
  padding:18px;
  border-left:5px solid #2563eb;
  background:#f8f9fa;
  border-radius:10px;
}

/* 강조 */
.highlight {
  font-weight:900;
  color:#2563eb;
}

.star {
  color:#facc15;
  font-weight:bold;
}

/* 날짜 */
.date {
  font-size:12px;
  color:#333;
  margin-top:-5px;
}

/* no data */
.no-data {
  background:#1f1f1f;
  border:2px solid #ff4d4d;
  padding:30px;
  border-radius:18px;
  text-align:center;
}

.no-data .title {
  font-size:22px;
  font-weight:bold;
  color:#ff4d4d;
}

.no-data .desc {
  color:#ffb4a2;
  font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h1>🧐 AI 트렌드 브리핑</h1>

<div class="card">

<div class="search-box">
<input id="keyword" placeholder="키워드를 입력하세요">
<button onclick="analyze()">분석</button>
</div>

<div id="result"></div>

</div>
</div>

<script>

/* =========================
   📅 7일 실제 날짜 계산
========================= */
function get7DayRange(){
  const now = new Date();
  const past = new Date();
  past.setDate(now.getDate() - 7);

  const f = (d)=> `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

  return `${f(past)} ~ ${f(now)}`;
}

/* =========================
   📊 점수 (고정형)
========================= */
function getScore(keyword){
  let base = 60;

  if(keyword.includes("AI")) base = 85;
  if(keyword.includes("원룸")) base = 78;
  if(keyword.includes("코딩")) base = 88;

  return base;
}

/* =========================
   🎨 색상 (세밀 연동)
========================= */
function getColor(score){
  if(score <= 15) return "#0b6b2f";
  if(score <= 30) return "#2ecc71";
  if(score <= 45) return "#f1c40f";
  if(score <= 60) return "#f39c12";
  if(score <= 75) return "#e67e22";
  if(score <= 85) return "#d35400";
  return "#e74c3c";
}

/* =========================
   📰 화제성 (고정 + 확장)
========================= */
function news(keyword){

  return `
  <div class="section">
    <h3>📰 인터넷 화제성 분석 ⭐</h3>

    <div class="date">
      (최근 분석 기간: ${get7DayRange()})
    </div>

    <p>
      <b style="color:#2563eb;">
      ${keyword}
      </b>
      는 최근 7일 기준으로 SNS, 유튜브, 커뮤니티에서 지속적으로 언급되고 있는 주제입니다.
    </p>

    <p>
      특히 <b style="color:#2563eb;">짧은 영상 콘텐츠</b> 기반 확산이 두드러지며,
      검색량과 관심도가 <b>동시에 유지되는 구조</b>를 보입니다.
    </p>

    <p>
      콘텐츠 소비 패턴은 <b>반복 탐색형</b>이며,
      정보성 + 흥미성 혼합 구조가 강하게 나타납니다 ⭐
    </p>
  </div>
  `;
}

/* =========================
   👥 핵심 관심
========================= */
function interest(keyword){
  return `
  <div class="section">
    <h3>👥 핵심 관심 ⭐</h3>

    <b style="color:#2563eb;font-weight:900;">
      • ${keyword} 기본 구조
    </b><br>

    <b style="color:#2563eb;font-weight:900;">
      • 활용 방법
    </b><br>

    <b style="color:#2563eb;font-weight:900;">
      • 실전 적용 사례
    </b><br>
  </div>
  `;
}

/* =========================
   ❓ 질문
========================= */
function questions(keyword){
  return `
  <div class="section">
    <h3>❓ 사람들이 궁금해하는 것 ⭐</h3>

    <b>• ${keyword}는 왜 뜨는가?</b><br>
    <b>• 지금 시작해도 되는가?</b><br>
    <b>• 실제 수익성은 있는가?</b><br>
  </div>
  `;
}

/* =========================
   🚀 분석 실행
========================= */
function analyze(){

const keyword = document.getElementById("keyword").value.trim();
if(!keyword) return alert("입력하세요");

const score = getScore(keyword);
const color = getColor(score);

let result = `
<h2>🔍 ${keyword}</h2>

<span class="badge" style="background:${color}">
🔥 ${score}점
</span>

<div class="meter">
<div class="bar" style="width:${score}%;background:${color}"></div>
</div>
`;

result += news(keyword);
result += interest(keyword);
result += questions(keyword);

document.getElementById("result").innerHTML = result;
}

</script>

</body>
</html>
