<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧐 AI 트렌드 분석기</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>

body {
  margin:0;
  background:#121212;
  color:white;
  font-family:Pretendard;
}

.container {
  max-width:900px;
  margin:50px auto;
  padding:20px;
}

h1 {
  text-align:center;
  font-size:2.2rem;
}

.card {
  background:white;
  color:#222;
  padding:30px;
  border-radius:20px;
}

/* 입력 */
.search-box {
  display:flex;
  gap:10px;
}

input {
  flex:1;
  padding:15px;
  border-radius:10px;
  background:#1f1f1f;
  color:white;
  border:none;
}

/* 버튼 */
button {
  padding:15px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:0.15s;
}

button:active {
  transform:scale(0.95);
}

/* 배지 */
.badge {
  display:inline-block;
  padding:6px 10px;
  border-radius:8px;
  color:white;
  font-weight:bold;
  margin-right:6px;
}

/* 경쟁도 색상 */
.low { background:#22c55e; }   /* 낮음 = 초록 */
.mid { background:#facc15; color:black; } /* 중간 = 노랑 */
.high { background:#ef4444; }  /* 높음 = 빨강 */

/* 점수 바 */
.meter {
  height:10px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}

.bar {
  height:100%;
  transition:0.5s;
  background:linear-gradient(90deg,#22c55e,#facc15,#ef4444);
}

/* ⚠️ 데이터 부족 */
.no-data {
  background:#1f1f1f;
  border:1px solid #ff4d4d;
  padding:20px;
  border-radius:15px;
  text-align:center;
}

.no-data .title {
  font-size:18px;
  font-weight:bold;
}

.no-data .desc {
  color:#aaa;
  font-size:13px;
  margin-top:5px;
}

</style>
</head>

<body>

<div class="container">

<h1>🧐 AI 트렌드 분석기</h1>

<div class="card">

<div class="search-box">
<input id="keyword" placeholder="키워드를 입력하세요">
<button onclick="analyze()">분석하기</button>
</div>

<div id="result"></div>

</div>
</div>

<script>

function scoreGen() {
  return Math.floor(Math.random()*40 + 60);
}

function getLevel(score) {
  if(score < 70) return "low";
  if(score < 85) return "mid";
  return "high";
}

function getText(level) {
  if(level === "low") return "경쟁 낮음";
  if(level === "mid") return "경쟁 중간";
  return "경쟁 매우 높음";
}

function analyze() {

const keyword = document.getElementById("keyword").value.trim();
if(!keyword) return alert("입력하세요");

const score = scoreGen();
const level = getLevel(score);

let result = "";

if(keyword.includes("AI")) {

result = `
<h2>🔍 ${keyword}</h2>

<span class="badge ${level}">${getText(level)}</span>
<span class="badge ${level}">🔥 ${score}점</span>

<div class="meter">
<div class="bar" style="width:${score}%"></div>
</div>

<hr>

<h3>❓ 질문</h3>
• AI 활용법<br>
• 자동화 도구<br>
`;

} else {

result = `
<div class="no-data">
<div class="title">⚠️ 데이터 부족</div>
<div class="desc">아직 충분한 분석 데이터가 없습니다</div>
</div>
`;

}

document.getElementById("result").innerHTML = result;
}

</script>

</body>
</html>
