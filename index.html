<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧐 AI 트렌드 분석기</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>

body {
  margin:0;
  background:#121212;
  color:white;
  font-family:Pretendard;
}

.container {
  max-width:900px;
  margin:50px auto;
  padding:20px;
}

h1 { text-align:center; }

.card {
  background:#fff;
  color:#222;
  padding:30px;
  border-radius:20px;
}

.search-box {
  display:flex;
  gap:10px;
}

input {
  flex:1;
  padding:15px;
  border-radius:10px;
  background:#1f1f1f;
  color:white;
}

button {
  padding:15px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

button:active {
  transform:scale(0.95);
}

/* badges */
.badge {
  padding:6px 10px;
  border-radius:8px;
  color:white;
  font-weight:bold;
  display:inline-block;
  margin-right:5px;
}

/* 상태별 색 */
.low { background:#22c55e; }
.mid { background:#facc15; color:black; }
.high { background:#ef4444; }

/* meter */
.meter {
  height:10px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}

.bar {
  height:100%;
  transition:0.5s;
  background:linear-gradient(90deg,#22c55e,#facc15,#ef4444);
}

/* no data */
.no-data {
  background:#1f1f1f;
  border:1px solid #ff4d4d;
  padding:20px;
  border-radius:15px;
  text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h1>🧐 AI 트렌드 분석기</h1>

<div class="card">

<div class="search-box">
<input id="keyword" placeholder="키워드 입력">
<button onclick="analyze()">분석</button>
</div>

<div id="result"></div>

</div>
</div>

<script>

function getScore() {
  return Math.floor(Math.random()*40+60);
}

function getCompetition(score) {
  if(score < 70) return "low";
  if(score < 85) return "mid";
  return "high";
}

function analyze() {

const keyword = document.getElementById("keyword").value.trim();
if(!keyword) return alert("입력하세요");

let score = getScore();
let comp = getCompetition(score);

let compText =
comp === "low" ? "경쟁 낮음" :
comp === "mid" ? "경쟁 중간" :
"경쟁 매우 높음";

let result = "";

if(keyword.includes("AI")) {

result = `
<h2>🔍 ${keyword}</h2>

<span class="badge ${comp}">⚡ ${compText}</span>
<span class="badge ${comp}">🔥 ${score}점</span>

<div class="meter">
<div class="bar" style="width:${score}%"></div>
</div>

<hr>

<h3>❓ 질문</h3>
• AI 활용법<br>
• 자동화 방법<br>
`;

} else {

result = `
<div class="no-data">
⚠️ 데이터 부족<br>
<small>아직 분석 데이터가 없습니다</small>
</div>
`;

}

document.getElementById("result").innerHTML = result;
}

</script>

</body>
</html>
