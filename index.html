<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🧐 AI 키워드 검색·분석기</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>

body{
  margin:0;
  background:#0f1115;
  color:white;
  font-family:Pretendard, sans-serif;
}

.container{
  max-width:1100px;
  margin:50px auto;
  padding:20px;
}

/* INPUT */
.search-box{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

input{
  flex:1;
  padding:18px;
  border-radius:12px;
  border:none;
  background:#1a1d25;
  color:white;
  font-weight:900;
  font-size:20px;
  text-align:center;
}

button{
  padding:14px 20px;
  border:none;
  border-radius:10px;
  background:#0072ff;
  color:white;
  cursor:pointer;
}

/* GRID */
.grid{
  display:none;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.grid.show{
  display:grid;
  animation:fade 0.4s ease;
}

@keyframes fade{
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}

/* CARD */
.card{
  background:#1a1d25;
  padding:18px;
  border-radius:14px;
  margin-top:15px;

  opacity:0;
  transform:translateY(20px);
  transition:0.4s ease;
}

.card.show{
  opacity:1;
  transform:translateY(0);
}

/* BOX */
.box{
  margin-top:10px;
  padding:12px;
  background:#151925;
  border-radius:10px;
  line-height:1.6;
}

.blue{
  color:#3b82f6;
  font-weight:800;
}

</style>
</head>

<body>

<div class="container">

<h1>🧐 AI 키워드 검색·분석기</h1>

<p class="subtitle">
최근 7일간 뉴스·SNS·커뮤니티 데이터를 AI가 분석합니다.
</p>

<div class="search-box">
  <input id="keyword" placeholder="키워드 입력" />
  <button onclick="startSearch()">분석</button>
</div>

<!-- DASHBOARD -->
<div class="grid" id="dashboard">

  <div class="card" id="c1">
    <h3>🔥 경쟁도</h3>
    <p id="competitionText"></p>
  </div>

  <div class="card" id="c2">
    <h3>📈 트렌드</h3>
    <p id="trendText"></p>
  </div>

</div>

<!-- HOT -->
<div class="card" id="hotCard">
  <h3>📊 인터넷 화제성 분석</h3>
  <div id="hotTopic"></div>
</div>

<!-- MARKET -->
<div class="card" id="marketCard">
  <h3>📊 시장 구조 분석</h3>
  <div id="marketAnalysis"></div>
</div>

<!-- REPORT -->
<div class="card" id="reportCard">
  <h3>🧠 AI 리포트</h3>
  <div id="report"></div>
</div>

</div>

<script>

function show(el){
  setTimeout(()=> el.classList.add("show"), 60);
}

async function startSearch(){

  const keyword = document.getElementById("keyword").value;
  if(!keyword) return alert("키워드 입력");

  const res = await fetch(`/api/analyze?keyword=${encodeURIComponent(keyword)}`);
  const data = await res.json();

  document.getElementById("dashboard").classList.add("show");

  document.getElementById("competitionText").innerText = data.meta.competition;
  document.getElementById("trendText").innerText = data.meta.trendScore;

  show(document.getElementById("c1"));
  show(document.getElementById("c2"));
  show(document.getElementById("hotCard"));
  show(document.getElementById("marketCard"));
  show(document.getElementById("reportCard"));

  // HOT
  document.getElementById("hotTopic").innerHTML = `
    <div class="box"><b>요약:</b><br>${data.hotTopic.summary}</div>
    <div class="box"><b>이유:</b><br>${data.hotTopic.reasons.join("<br>")}</div>
    <div class="box"><b>판단:</b><br>${data.hotTopic.insight}</div>
  `;

  // MARKET
  document.getElementById("marketAnalysis").innerHTML = `
    <div class="box">${data.marketAnalysis.structure}</div>
    <div class="box">${data.marketAnalysis.entry}</div>
    <div class="box">${data.marketAnalysis.profit}</div>
  `;

  // REPORT
  document.getElementById("report").innerHTML = `
    <h2><span class="blue">${data.keyword}</span> 분석 리포트</h2>

    <div class="box">
      <b>왜 인기인가?</b><br><br>
      ${data.report.whyPopular}
    </div>

    <div class="box">
      <b>장점:</b><br>${data.report.pros}
    </div>

    <div class="box">
      <b>단점:</b><br>${data.report.cons}
    </div>

    <div class="box">
      <b>7일 검색량:</b> ${data.report.searchVolume7d.toLocaleString()}<br>
      <b>언급량:</b> ${data.report.newsCount}
    </div>

    <div class="box">
      <b>🧠 AI 개인 견해:</b><br><br>
      <span class="blue">${data.report.aiOpinion}</span>
    </div>
  `;
}

</script>

</body>
</html>
