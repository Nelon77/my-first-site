<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🧐 AI 트렌드 브리핑</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>

body {
  margin:0;
  background:#121212;
  color:white;
  font-family:Pretendard;
}

.container {
  max-width:1200px;
  margin:80px auto;
  padding:30px;
}

h1 {
  text-align:center;
  font-size:2.8rem;
  margin-bottom:35px;
}

/* 카드 */
.card {
  background:white;
  color:#222;
  padding:50px;
  border-radius:28px;
}

/* 검색창 */
.search-box {
  display:flex;
  gap:15px;
}

input {
  flex:1;
  padding:20px;
  font-size:18px;
  border-radius:12px;
  background:#1f1f1f;
  color:white;
  border:none;
  text-align:center;
  font-weight:700;
}

button {
  padding:20px 30px;
  font-size:18px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

/* 점수 배지 */
.badge {
  display:inline-block;
  padding:9px 14px;
  border-radius:10px;
  color:white;
  font-weight:bold;
  margin-right:8px;
}

/* meter */
.meter {
  height:18px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  margin-top:14px;
}

.bar {
  height:100%;
  transition:0.5s;
}

/* 섹션 공통 */
.section {
  margin-top:22px;
  padding:18px;
  border-radius:12px;
}

/* 🔵 화제성 전용 배경 */
.blue-bg {
  background:#eef5ff;
  border-left:5px solid #2563eb;
}

/* 강조 */
.highlight {
  font-weight:900;
  color:#2563eb;
}

/* 점수 글자 */
.score-text {
  color:black;
  font-weight:900;
}

/* 별 */
.star {
  color:#facc15;
}

/* 소제목 */
h3 {
  margin-bottom:10px;
}

/* 날짜 */
.date {
  font-size:12px;
  color:#000;
  opacity:0.7;
  margin-left:6px;
}

/* no data */
.no-data {
  background:#1f1f1f;
  border:2px solid #ff4d4d;
  padding:30px;
  border-radius:18px;
  text-align:center;
}

.no-data .title {
  font-size:20px;
  font-weight:bold;
  color:#ff4d4d;
}

.no-data .desc {
  color:#ffb4a2;
  font-size:14px;
  margin-top:6px;
}

</style>
</head>

<body>

<div class="container">

<h1>🧐 AI 트렌드 브리핑</h1>

<div class="card">

<div class="search-box">
<input id="keyword" placeholder="키워드를 입력하세요">
<button onclick="analyze()">분석</button>
</div>

<div id="result"></div>

</div>
</div>

<script>

/* 🔥 7일 기준 날짜 계산 */
function getWeekRange() {
  const now = new Date();
  const end = new Date(now);
  const start = new Date(now);
  start.setDate(now.getDate() - 6);

  const fmt = (d) => `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}`;

  return `${fmt(start)} ~ ${fmt(end)}`;
}

/* 🔥 안정 점수 (7일 기준 고정) */
function score(keyword) {
  let hash = 0;
  for (let i = 0; i < keyword.length; i++) {
    hash = (hash * 31 + keyword.charCodeAt(i)) % 100;
  }
  return 40 + (hash % 61); // 40~100
}

/* 🔥 색상 매핑 (요청한 구간 그대로) */
function getColor(s) {
  if (s <= 15) return "#0b6623";      // 진한 초록
  if (s <= 30) return "#3cb371";      // 연두
  if (s <= 45) return "#facc15";      // 노랑
  if (s <= 60) return "#f59e0b";      // 노랑~주황
  if (s <= 75) return "#f97316";      // 주황
  if (s <= 85) return "#ea580c";      // 진한 주황
  return "#ef4444";                   // 빨강
}

/* 🔵 화제성 뉴스 */
function news(keyword){
  return `
  <div class="section blue-bg">

    <h3>📰 인터넷 화제성 분석 ⭐
      <span class="date">(${getWeekRange()})</span>
    </h3>

    <p>
      <b>${keyword}</b> 관련 키워드는 최근 7일 기준
      <span class="highlight">SNS / 유튜브 / 커뮤니티</span>에서 꾸준히 언급되고 있습니다.
    </p>

    <p>
      특히 <b>짧은 콘텐츠 중심 확산</b>이 강하며,
      검색량과 관심도가 동시에 유지되는 흐름입니다.
    </p>

    <p>
      전체적으로 <b>화제성은 중~상위 수준</b>으로 분석됩니다 ⭐
    </p>

  </div>
  `;
}

/* 👥 핵심 관심 */
function interest(keyword){
  return `
  <div class="section">
    <h3>👥 핵심 관심 ⭐</h3>

    <b>• ${keyword} 기본 이해</b><br>
    <b>• 실생활 활용 방법</b><br>
    <b>• 수익/응용 가능성</b><br>
  </div>
  `;
}

/* ❓ 질문 */
function questions(keyword){
  return `
  <div class="section">
    <h3>❓ 사람들이 궁금해하는 것 ⭐</h3>

    <b>• 지금 시작해도 될까?</b><br>
    <b>• 실제로 돈이 될까?</b><br>
    <b>• 경쟁은 어떤 수준일까?</b><br>
  </div>
  `;
}

/* 🚀 분석 */
function analyze(){

const keyword = document.getElementById("keyword").value.trim();
if(!keyword) return alert("입력하세요");

const s = score(keyword);
const color = getColor(s);

let result = `
<h2>🔍 <b>${keyword}</b></h2>

<span class="badge" style="background:${color}">
🔥 <span class="score-text">${s}점</span>
</span>

<div class="meter">
<div class="bar" style="width:${s}%; background:${color}"></div>
</div>
`;

result += news(keyword);
result += interest(keyword);
result += questions(keyword);

document.getElementById("result").innerHTML = result;
}

</script>

</body>
</html>
