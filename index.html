<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🧐 AI 키워드 검색·분석기</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>

body{
  margin:0;
  background:#0f1115;
  color:white;
  font-family:Pretendard, sans-serif;
}

.container{
  max-width:1050px;
  margin:50px auto;
  padding:20px;
}

/* TITLE */
h1{
  text-align:center;
  margin-bottom:10px;
}

/* SUBTITLE (고정 요구) */
.subtitle{
  text-align:center;
  color:#aaa;
  margin-bottom:30px;
}

/* INPUT */
.search-box{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

input{
  flex:1;
  padding:18px;
  border-radius:12px;
  border:none;
  background:#1a1d25;
  color:white;
  font-weight:900;
  font-size:20px;
  text-align:center;
}

button{
  padding:14px 20px;
  border:none;
  border-radius:10px;
  background:#0072ff;
  color:white;
  cursor:pointer;
  font-weight:700;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  display:none;
}

/* CARD */
.card{
  background:#1a1d25;
  padding:18px;
  border-radius:14px;
  margin-top:15px;
  display:none;
}

/* BAR */
.bar{
  width:100%;
  height:12px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  transition:0.3s;
}

/* REPORT */
.report{
  line-height:1.75;
}

.blue{
  color:#3b82f6;
  font-weight:800;
}

.box{
  margin-top:10px;
  padding:12px;
  background:#151925;
  border-radius:10px;
}

.small{
  opacity:0.7;
  font-size:13px;
}

</style>
</head>

<body>

<div class="container">

  <!-- TITLE (고정) -->
  <h1>🧐 AI 키워드 검색·분석기</h1>

  <!-- SUBTITLE (고정) -->
  <p class="subtitle">
    최근 7일간 뉴스·SNS·커뮤니티 데이터를 AI가 분석합니다.
  </p>

  <div class="search-box">
    <input id="keyword" placeholder="키워드 입력" />
    <button onclick="startSearch()">분석</button>
  </div>

  <!-- DASHBOARD -->
  <div class="grid" id="dashboard">

    <div class="card">
      <h3>🔥 경쟁도</h3>
      <p id="competitionText">0</p>
    </div>

    <div class="card">
      <h3>📈 트렌드</h3>
      <p id="trendText">0</p>
    </div>

  </div>

  <!-- HOT -->
  <div class="card" id="hotCard">
    <h3>📊 인터넷 화제성 분석</h3>
    <div id="hotTopic"></div>
  </div>

  <!-- MARKET -->
  <div class="card" id="marketCard">
    <h3>📊 시장 구조 분석</h3>
    <div id="marketAnalysis"></div>
  </div>

  <!-- REPORT -->
  <div class="card" id="reportCard">
    <h3>🧠 AI 리포트</h3>
    <div id="report" class="report"></div>
  </div>

</div>

<script>

async function startSearch(){

  const keyword=document.getElementById("keyword").value;
  if(!keyword) return alert("키워드 입력");

  // SHOW UI
  document.getElementById("dashboard").style.display="grid";
  document.getElementById("hotCard").style.display="block";
  document.getElementById("marketCard").style.display="block";
  document.getElementById("reportCard").style.display="block";

  try{

    const res = await fetch(`/api/analyze?keyword=${encodeURIComponent(keyword)}`);
    const data = await res.json();

    // 📊 기본 출력
    document.getElementById("competitionText").innerText = data.meta.competition;
    document.getElementById("trendText").innerText = data.meta.trendScore;

    // 📊 인터넷 화제성
    document.getElementById("hotTopic").innerHTML = `
      <div class="box"><b>요약:</b> ${data.hotTopic.summary}</div>

      <div class="box">
        <b>이유:</b>
        <ul>
          ${data.hotTopic.reasons.map(r => `<li>${r}</li>`).join("")}
        </ul>
      </div>

      <div class="box"><b>판단:</b> ${data.hotTopic.insight}</div>

      <div class="box">
        <b>7일 검색량:</b> <span class="blue">${data.meta.searchVolume7d.toLocaleString()}</span>
      </div>
    `;

    // 📊 시장 구조
    document.getElementById("marketAnalysis").innerHTML = `
      <div class="box">${data.marketAnalysis.structure}</div>
      <div class="box">${data.marketAnalysis.entry}</div>
      <div class="box">${data.marketAnalysis.profit}</div>
    `;

    // 🧠 AI 리포트 (강화 버전)
    document.getElementById("report").innerHTML = `
      <h2><span class="blue">${data.keyword}</span> 분석 리포트</h2>

      <div class="box">
        <b>카테고리:</b> <span class="blue">${data.category}</span>
      </div>

      <div class="box">
        <b>트렌드 상태:</b> <span class="blue">${data.intensity}</span> / ${data.trendState}
      </div>

      <div class="box">
        <b>핵심 분석:</b><br><br>

        ${data.keyword}는 단순 검색어가 아니라<br>
        <span class="blue">${data.category}</span> 영역에서 실제로 관심이 형성되는 주제입니다.<br><br>

        현재 <span class="blue">${data.meta.searchVolume7d.toLocaleString()}</span>회의 검색량과<br>
        <span class="blue">${data.meta.newsCount}</span>개의 뉴스/커뮤니티 언급이 발생하고 있으며,<br><br>

        이는 <span class="blue">${data.intensity}</span> 단계의 관심 흐름으로 판단됩니다.<br><br>

        특히 경쟁도 <span class="blue">${data.meta.competition}</span> 기준으로 볼 때<br>
        ${data.meta.competition > 75 ? "이미 경쟁이 치열한 구조" : "아직 확장 가능한 구조"}입니다.
      </div>
    `;
  }
}

</script>

</body>
</html>
