<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>🧐 AI 트렌드 분석기</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net">

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
  >

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #121212;
      color: #ffffff;
      font-family: "Pretendard", sans-serif;
    }

    .container {
      max-width: 900px;
      margin: 50px auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #ffffff;
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .card {
      background: #ffffff;
      color: #222222;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
    }

    .search-box {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 15px;
      border: 2px solid #444444;
      border-radius: 12px;
      background: #1f1f1f;
      color: #ffffff;
      font-size: 18px;
      font-family: "Pretendard", sans-serif;
    }

    input::placeholder {
      color: #aaaaaa;
    }

    button {
      padding: 15px 25px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: #ffffff;
      font-size: 18px;
      font-family: "Pretendard", sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: #1d4ed8;
    }

    #result {
      margin-top: 30px;
      line-height: 1.8;
    }

    .badge {
      display: inline-block;
      padding: 8px 12px;
      margin-right: 10px;
      margin-bottom: 10px;
      border-radius: 10px;
      color: white;
      font-size: 14px;
      font-weight: bold;
    }

    .hot {
      background: #ff5722;
    }

    .up {
      background: #4caf50;
    }

    /* 🔥 변경된 부분 (주황 → 붉은색) */
    .warn {
      background: #ff4d4d;
    }

    hr {
      border: none;
      border-top: 1px solid #dddddd;
      margin: 25px 0;
    }

    @media (max-width: 600px) {
      .search-box {
        flex-direction: column;
      }

      button {
        width: 100%;
      }

      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>🧐 AI 트렌드 분석기</h1>

    <div class="card">

      <div class="search-box">

        <input type="text" id="keyword" placeholder="키워드를 입력하세요">

        <button onclick="analyze()">분석하기</button>

      </div>

      <div id="result"></div>

    </div>

  </div>

  <script>

    function analyze() {

      const keyword = document.getElementById("keyword").value.trim();

      if (keyword === "") {
        alert("키워드를 입력하세요.");
        return;
      }

      let result = "";

      if (keyword.includes("원룸")) {

        result = `
          <h2>🔍 검색어: ${keyword}</h2>

          <span class="badge hot">🔥 화제성 87점</span>
          <span class="badge up">📈 상승 중</span>
          <span class="badge warn">⚠️ 경쟁 중간</span>

          <hr>

          <h3>👥 핵심 관심 세대</h3>

          10대 ★★★☆☆<br>
          20대 ★★★★★<br>
          30대 ★★★★☆<br>

          <hr>

          <h3>세부 관심 주제</h3>

          👍 저예산 인테리어<br>
          → "10만 원 이하 방 꾸미기" 검색량 증가<br>
          → 대학생·사회초년생 관심도 높음<br><br>

          👍 학생 방 꾸미기<br>
          → 쇼츠·릴스 반응 높음<br>
          → 책상 배치 질문 증가<br><br>

          👎 북유럽 인테리어<br>
          → 관심 감소<br>
        `;

      } else if (keyword.includes("AI") || keyword.includes("인공지능")) {

        result = `
          <h2>🔍 검색어: ${keyword}</h2>

          <span class="badge hot">🔥 화제성 95점</span>
          <span class="badge up">📈 급상승</span>
          <span class="badge warn">⚠️ 경쟁 높음</span>

          <hr>

          <h3>👥 핵심 관심 세대</h3>

          10대 ★★★★☆<br>
          20대 ★★★★★<br>
          30대 ★★★★★<br>

          <hr>

          <h3>❓ 사람들이 궁금해하는 것</h3>

          • AI 툴 추천<br>
          • 영상 제작 방법<br>
        `;

      } else {

        result = `
          <h2>🔍 검색어: ${keyword}</h2>

          <span class="badge warn">⚠️ 데이터 부족</span>

          <hr>

          <p>아직 분석 데이터가 부족합니다.</p>
        `;
      }

      document.getElementById("result").innerHTML = result;
    }

  </script>

</body>
</html>
