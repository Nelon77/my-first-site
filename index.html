<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AI 트렌드 분석기</title>

  <style>
    body {
      margin: 0;
      background: #121212;
      color: #ffffff;
      font-family: sans-serif;
    }

    .container {
      max-width: 900px;
      margin: 50px auto;
      padding: 20px;
    }

    .card {
      background: #ffffff;
      color: #222222;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #ffffff;
    }

    .search-box {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 15px;
      border: 2px solid #444;
      border-radius: 12px;
      font-size: 18px;
      background: #1f1f1f;
      color: #ffffff;
    }

    input::placeholder {
      color: #aaaaaa;
    }

    button {
      padding: 15px 25px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: #ffffff;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #1d4ed8;
    }

    #result {
      margin-top: 30px;
      line-height: 1.8;
    }

    .badge {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 10px;
      margin-right: 10px;
      margin-bottom: 10px;
      color: white;
      font-size: 14px;
      font-weight: bold;
    }

    .hot {
      background: #ff5722;
    }

    .up {
      background: #4caf50;
    }

    .warn {
      background: #ff9800;
    }

    hr {
      border: none;
      border-top: 1px solid #dddddd;
      margin: 25px 0;
    }

    @media (max-width: 600px) {
      .search-box {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>🔥 AI 트렌드 분석기</h1>

    <div class="card">

      <div class="search-box">
        <input
          id="keyword"
          placeholder="키워드를 입력하세요"
        >

        <button onclick="analyze()">
          분석하기
        </button>
      </div>

      <div id="result"></div>

    </div>

  </div>

  <script>

    function analyze() {

      const keyword = document
        .getElementById("keyword")
        .value
        .trim();

      if (!keyword) {
        alert("키워드를 입력하세요.");
        return;
      }

      let result = "";

      if (keyword.includes("원룸")) {

        result = `
          <h2>🔍 검색어: ${keyword}</h2>

          <span class="badge hot">🔥 화제성 87점</span>
          <span class="badge up">📈 상승 중</span>
          <span class="badge warn">⚠️ 경쟁 중간</span>

          <hr>

          <h3>👥 핵심 관심 세대</h3>

          10대 ★★★☆☆<br>
          20대 ★★★★★<br>
          30대 ★★★★☆<br>

          <hr>

          <h3>세부 관심 주제</h3>

          👍 저예산 인테리어<br>
          → "10만 원 이하 방 꾸미기" 검색량 증가<br>
          → 대학생·사회초년생 관심도 높음<br>
          → 가성비 콘텐츠 선호<br><br>

          👍 학생 방 꾸미기<br>
          → 쇼츠·릴스 반응 높음<br>
          → 책상 배치 질문 증가<br>
          → 수납 꿀팁 콘텐츠 인기<br><br>

          👎 북유럽 인테리어<br>
          → 미니멀 키워드로 관심 이동<br>
          → 고가 가구 콘텐츠 반응 감소<br>

          <hr>

          <h3>❓ 사람들이 궁금해하는 것</h3>

          • 좁은 방 수납 방법은?<br>
          • 예산 10만 원으로 가능할까?<br>
          • 다이소 추천템은?<br>

          <hr>

          <h3>🎥 반응 좋은 콘텐츠 유형</h3>

          • 전후 비교 영상<br>
          • 다이소 추천템 모음<br>
          • 방 꾸미기 챌린지<br>
        `;

      } else if (
        keyword.includes("AI") ||
        keyword.includes("인공지능")
      ) {

        result = `
          <h2>🔍 검색어: ${keyword}</h2>

          <span class="badge hot">🔥 화제성 95점</span>
          <span class="badge up">📈 급상승</span>
          <span class="badge warn">⚠️ 경쟁 높음</span>

          <hr>

          <h3>👥 핵심 관심 세대</h3>

          10대 ★★★★☆<br>
          20대 ★★★★★<br>
          30대 ★★★★★<br>

          <hr>

          <h3>세부 관심 주제</h3>

          👍 AI 영상 제작<br>
          → 쇼츠 자동 제작 관심 증가<br>
          → 유튜브 크리에이터 유입 증가<br><br>

          👍 AI 공부법<br>
          → 학생 사용자 급증<br>
          → 프롬프트 활용법 인기<br><br>

          👍 AI 업무 자동화<br>
          → 생산성 도구 관심 증가<br>
          → 직장인 검색량 상승<br>

          <hr>

          <h3>❓ 사람들이 궁금해하는 것</h3>

          • 무료 AI 툴 추천은?<br>
          • AI로 영상 만드는 방법은?<br>
          • 공부에 활용할 수 있을까?<br>

          <hr>

          <h3>🎥 반응 좋은 콘텐츠 유형</h3>

          • AI 툴 모음 영상<br>
          • 업무 자동화 사례<br>
          • 1분 AI 꿀팁 쇼츠<br>
        `;

      } else {

        result = `
          <h2>🔍 검색어: ${keyword}</h2>

          <span class="badge warn">⚠️ 데이터 부족</span>

          <hr>

          <p>아직 분석 데이터가 부족합니다.</p>

          <p>곧 더 많은 키워드를 지원할 예정입니다.</p>
        `;
      }

      document.getElementById("result").innerHTML = result;
    }

  </script>

</body>
</html>
