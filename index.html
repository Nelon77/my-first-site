<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🧐 AI 트렌드 브리핑</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>

body {
  margin:0;
  background:#121212;
  color:white;
  font-family:Pretendard;
  font-size:18px;
}

.container {
  max-width:1200px;
  margin:80px auto;
  padding:30px;
}

h1 {
  text-align:center;
  font-size:2.8rem;
  margin-bottom:35px;
}

.card {
  background:white;
  color:#222;
  padding:50px;
  border-radius:28px;
}

.search-box {
  display:flex;
  gap:15px;
}

input {
  flex:1;
  padding:20px;
  font-size:18px;
  border-radius:12px;
  background:#1f1f1f;
  color:white;
  border:none;
  text-align:center;
  font-weight:800;
}

button {
  padding:20px 30px;
  font-size:18px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

/* 🦖 FULL SCREEN DINO */
#dino {
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  background:rgba(255,255,255,0.98);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:9999;
  color:#000;
}

#dino .big {
  font-size:70px;
  font-weight:900;
}

#dino .small {
  font-size:22px;
  margin-top:10px;
}

/* 결과 */
#result {
  margin-top:25px;
}

/* 배지 */
.badge {
  display:inline-block;
  padding:10px 14px;
  border-radius:10px;
  color:white;
  font-weight:900;
  margin-right:8px;
}

/* meter */
.meter {
  height:18px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  margin-top:14px;
}

.bar {
  height:100%;
  transition:0.6s;
}

/* 섹션 */
.section {
  margin-top:25px;
  padding:20px;
  border-left:5px solid #2563eb;
  background:#f8f9fa;
  border-radius:10px;
  color:#111;
}

/* 뉴스 */
.news {
  margin-top:20px;
  padding:20px;
  border-left:6px solid #2563eb;
  background:#eef5ff;
  border-radius:10px;
}

.star {
  color:#facc15;
}

</style>
</head>

<body>

<div class="container">

<h1>🧐 AI 트렌드 브리핑</h1>

<div class="card">

<div class="search-box">
<input id="keyword" placeholder="키워드를 입력하세요">
<button onclick="analyze()">분석</button>
</div>

<!-- 🦖 DINO -->
<div id="dino">
  <div class="big">🦖 검색 완료!</div>
  <div class="small">잠시만 기다려 주시오!!</div>
</div>

<div id="result"></div>

</div>
</div>

<script>

/* 점수 */
function score(){
  return Math.floor(Math.random()*100);
}

/* 색 매핑 */
function getColor(s){
  if(s <= 15) return "rgb(0,140,60)";
  if(s <= 30) return "rgb(80,200,80)";
  if(s <= 45) return "rgb(255,230,80)";
  if(s <= 60) return "rgb(255,170,60)";
  if(s <= 75) return "rgb(255,120,40)";
  if(s <= 85) return "rgb(220,80,30)";
  return "rgb(220,40,40)";
}

/* 게이지 */
function getGradient(color){
  return `linear-gradient(90deg,
    rgb(0,140,60),
    ${color},
    rgb(220,40,40)
  )`;
}

/* 🦖 공룡 (0.8초) */
function showDino(){
  const d = document.getElementById("dino");
  d.style.display = "flex";

  setTimeout(()=>{
    d.style.display = "none";
  }, 800);
}

/* 뉴스 */
function news(k){
  return `
  <div class="news">
    <h3>📰 인터넷 화제성 ★</h3>
    <p><b>${k}</b>는 SNS에서 빠르게 확산 중입니다.</p>
    <p>최근 검색량 상승으로 <b>핵심 트렌드</b>로 분석됩니다.</p>
  </div>
  `;
}

/* 관심 */
function interest(k){
  return `
  <div class="section">
    <h3>👥 핵심 관심 ★</h3>
    <b>• ${k} 활용</b><br>
    <b>• 시장 구조</b><br>
    <b>• 성장 가능성</b><br>
  </div>
  `;
}

/* 질문 */
function questions(){
  return `
  <div class="section">
    <h3>❓ 질문 ★</h3>
    <b>• 지금 시작 가능?</b><br>
    <b>• 돈이 될까?</b><br>
    <b>• 경쟁 강도?</b><br>
  </div>
  `;
}

/* 분석 */
function analyze(){

const k = document.getElementById("keyword").value.trim();
if(!k) return alert("입력하세요");

showDino();

const s = score();
const color = getColor(s);

setTimeout(()=>{

document.getElementById("result").innerHTML = `

<h2>🔍 <b>${k}</b></h2>

<span class="badge" style="background:${color}">
🔥 ${s}점
</span>

<div class="meter">
<div class="bar" style="width:${s}%; background:${getGradient(color)}"></div>
</div>

${news(k)}
${interest(k)}
${questions()}

`;

}, 200);

}

</script>

</body>
</html>
