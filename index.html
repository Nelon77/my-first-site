<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🧐 AI 트렌드 브리핑</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>

body {
  margin:0;
  background:#121212;
  color:white;
  font-family:Pretendard;
  font-size:18px;
}

.container {
  max-width:1200px;
  margin:80px auto;
  padding:30px;
}

h1 {
  text-align:center;
  font-size:2.8rem;
  margin-bottom:35px;
}

.card {
  background:white;
  color:#222;
  padding:50px;
  border-radius:28px;
}

.search-box {
  display:flex;
  gap:15px;
}

input {
  flex:1;
  padding:20px;
  font-size:18px;
  border-radius:12px;
  background:#1f1f1f;
  color:white;
  border:none;
  text-align:center;
  font-weight:800;
}

button {
  padding:20px 30px;
  font-size:18px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

/* 결과 */
#result {
  margin-top:25px;
}

/* 배지 */
.badge {
  display:inline-block;
  padding:10px 14px;
  border-radius:10px;
  color:white;
  font-weight:900;
  margin-right:8px;
}

/* meter */
.meter {
  height:18px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  margin-top:14px;
}

.bar {
  height:100%;
  transition:0.6s;
}

/* 섹션 */
.section {
  margin-top:25px;
  padding:20px;
  border-left:5px solid #2563eb;
  background:#f8f9fa;
  border-radius:10px;
  color:#111;
}

/* ⭐ 강조 */
.star {
  color:#facc15;
  font-weight:900;
  margin-left:6px;
}

/* 뉴스 */
.news {
  margin-top:20px;
  padding:20px;
  border-left:6px solid #2563eb;
  background:#eef5ff;
  border-radius:10px;
}

/* 날짜 */
.date {
  font-size:13px;
  color:#555;
  margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>🧐 AI 트렌드 브리핑</h1>

<div class="card">

<div class="search-box">
<input id="keyword" placeholder="키워드를 입력하세요">
<button onclick="analyze()">분석</button>
</div>

<div id="result"></div>

</div>
</div>

<script>

////////////////////////////////////////////////////
// 🔥 1. 점수 고정 (키워드 기반 hash)
////////////////////////////////////////////////////
function score(keyword){
  let hash = 0;
  for(let i=0;i<keyword.length;i++){
    hash = (hash * 31 + keyword.charCodeAt(i)) % 100;
  }
  return 40 + (hash % 60); // 40~100 고정
}

////////////////////////////////////////////////////
// 🎨 색상 (구간 매핑 유지)
////////////////////////////////////////////////////
function getColor(s){
  if(s <= 15) return "rgb(0,140,60)";
  if(s <= 30) return "rgb(80,200,80)";
  if(s <= 45) return "rgb(255,230,80)";
  if(s <= 60) return "rgb(255,170,60)";
  if(s <= 75) return "rgb(255,120,40)";
  if(s <= 85) return "rgb(220,80,30)";
  return "rgb(220,40,40)";
}

////////////////////////////////////////////////////
// 📅 날짜 (7일 기준)
////////////////////////////////////////////////////
function getDateRange(){
  const now = new Date();
  const past = new Date();
  past.setDate(now.getDate() - 7);

  return `${past.toISOString().split("T")[0]} ~ ${now.toISOString().split("T")[0]} 기준`;
}

////////////////////////////////////////////////////
// 📰 화제성 (확장 버전)
////////////////////////////////////////////////////
function news(k){
  return `
  <div class="news">
    <h3>📰 인터넷 화제성 분석 <span class="star">★</span></h3>

    <div class="date">${getDateRange()}</div>

    <p><b>${k}</b>는 최근 SNS, 유튜브, 커뮤니티 전반에서 언급량이 꾸준히 증가하고 있는 주제입니다.</p>

    <p>특히 짧은 영상 콘텐츠(Shorts, Reels) 중심으로 확산 속도가 빠르며  
    사용자 참여형 콘텐츠가 급격히 증가하는 흐름이 관측됩니다.</p>

    <p>최근 7일 기준 검색량은 상승 추세이며  
    <b>트렌드 민감도가 높은 주제</b>로 분류됩니다 ★</p>
  </div>
  `;
}

////////////////////////////////////////////////////
// 👥 핵심 관심
////////////////////////////////////////////////////
function interest(k){
  return `
  <div class="section">
    <h3>👥 핵심 관심 <span class="star">★</span></h3>

    <b>• ${k}의 기본 구조 이해</b><br>
    <b>• 실제 활용 사례 분석</b><br>
    <b>• 수익/응용 가능성 탐색</b><br>
  </div>
  `;
}

////////////////////////////////////////////////////
// ❓ 질문
////////////////////////////////////////////////////
function questions(){
  return `
  <div class="section">
    <h3>❓ 사람들이 궁금해하는 것 <span class="star">★</span></h3>

    <b>• 지금 시작해도 늦지 않았나?</b><br>
    <b>• 실제 수익화가 가능한가?</b><br>
    <b>• 경쟁 강도는 어느 정도인가?</b><br>
  </div>
  `;
}

////////////////////////////////////////////////////
// 🚀 실행
////////////////////////////////////////////////////
function analyze(){

const k = document.getElementById("keyword").value.trim();
if(!k) return alert("입력하세요");

const s = score(k);
const color = getColor(s);

document.getElementById("result").innerHTML = `

<h2>🔍 <b>${k}</b></h2>

<span class="badge" style="background:${color}">
🔥 ${s}점
</span>

<div class="meter">
<div class="bar" style="width:${s}%; background:${color}"></div>
</div>

${news(k)}
${interest(k)}
${questions()}

`;

}

</script>

</body>
</html>
