<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>🧐 AI 키워드 분석기</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>

body{
  margin:0;
  background:#0f1115;
  color:white;
  font-family:Pretendard, sans-serif;
}

.container{
  max-width:1100px;
  margin:50px auto;
  padding:20px;
}

h1{
  text-align:center;
  margin-bottom:10px;
}

.subtitle{
  text-align:center;
  color:#aaa;
  margin-bottom:30px;
}

/* INPUT */
.search-box{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

input{
  flex:1;
  padding:18px;
  border-radius:12px;
  border:none;
  background:#1a1d25;
  color:white;
  font-weight:900;
  font-size:20px;
  text-align:center;
}

button{
  padding:14px 20px;
  border:none;
  border-radius:10px;
  background:#0072ff;
  color:white;
  cursor:pointer;
  font-weight:700;
}

/* DASHBOARD */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  display:none;
}

.card{
  background:#1a1d25;
  padding:18px;
  border-radius:14px;
  margin-top:15px;
  display:none;
}

/* BAR */
.bar{
  width:100%;
  height:12px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  transition:0.3s;
}

/* OUTPUT */
.output{
  white-space:pre-wrap;
  line-height:1.6;
}

</style>
</head>

<body>

<div class="container">

  <h1>🧐 AI 키워드 분석기</h1>

  <p class="subtitle">
    최근 7일간 뉴스·SNS·커뮤니티 데이터를 AI가 분석합니다.
  </p>

  <div class="search-box">
    <input id="keyword" placeholder="키워드 입력" />
    <button onclick="startSearch()">분석</button>
  </div>

  <!-- DASHBOARD -->
  <div class="grid" id="dashboard">

    <div class="card">
      <h3>🔥 경쟁도</h3>
      <div class="bar"><div id="competitionBar" class="fill"></div></div>
      <p id="competitionText">0</p>
    </div>

    <div class="card">
      <h3>📈 트렌드</h3>
      <div class="bar"><div id="trendBar" class="fill"></div></div>
      <p id="trendText">0</p>
    </div>

  </div>

  <!-- 📊 인터넷 화제성 -->
  <div class="card" id="hotCard">
    <h3>📊 인터넷 화제성</h3>
    <div id="hotTopic"></div>
  </div>

  <!-- 📊 시장 구조 -->
  <div class="card" id="marketCard">
    <h3>📊 시장 구조 분석</h3>
    <div id="marketAnalysis"></div>
  </div>

  <!-- 🧠 AI 리포트 -->
  <div class="card" id="reportCard">
    <h3>🧠 AI 리포트 분석</h3>
    <div id="output" class="output"></div>
  </div>

</div>

<script>

function animate(barId,textId,value){
  let cur=0;

  const bar=document.getElementById(barId);
  const text=document.getElementById(textId);

  const t=setInterval(()=>{
    cur+=2;
    if(cur>=value){cur=value;clearInterval(t);}
    bar.style.width=cur+"%";
    text.innerText=cur;
  },15);
}

async function startSearch(){

  const keyword=document.getElementById("keyword").value;
  if(!keyword) return alert("키워드 입력");

  document.getElementById("dashboard").style.display="grid";
  document.getElementById("hotCard").style.display="block";
  document.getElementById("marketCard").style.display="block";
  document.getElementById("reportCard").style.display="block";

  document.getElementById("hotTopic").innerText="분석 중...";
  document.getElementById("marketAnalysis").innerText="분석 중...";
  document.getElementById("output").innerText="분석 중...";

  try{

    const res = await fetch(`/api/analyze?keyword=${encodeURIComponent(keyword)}`);
    const data = await res.json();

    animate("competitionBar","competitionText",data.meta.competition);
    animate("trendBar","trendText",data.meta.trendScore);

    document.getElementById("hotTopic").innerText = data.hotTopic;
    document.getElementById("marketAnalysis").innerText = data.marketAnalysis;
    document.getElementById("output").innerText = data.report;

  } catch(e){
    document.getElementById("output").innerText = "⚠️ 서버 오류";
  }
}

</script>

</body>
</html>
