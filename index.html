<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🧐 AI 트렌드 브리핑</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>

body {
  margin:0;
  background:#121212;
  color:white;
  font-family:Pretendard;
  font-size:18px;
}

.container {
  max-width:1200px;
  margin:80px auto;
  padding:30px;
}

h1 {
  text-align:center;
  font-size:2.8rem;
  margin-bottom:35px;
}

.card {
  background:white;
  color:#222;
  padding:50px;
  border-radius:28px;
}

/* 검색 */
.search-box {
  display:flex;
  gap:15px;
  position:relative;
}

input {
  flex:1;
  padding:20px;
  font-size:18px;
  border-radius:12px;
  background:#1f1f1f;
  color:white;
  border:none;
  text-align:center;
  font-weight:800;
}

/* 자동추천 */
.suggest-box {
  position:absolute;
  top:70px;
  left:0;
  right:0;
  background:#222;
  border-radius:10px;
  display:none;
  z-index:10;
}

.suggest-box div {
  padding:12px;
  cursor:pointer;
  color:white; /* ✔ 완전 흰색 */
}

.suggest-box div:hover {
  background:#333;
}

/* 버튼 */
button {
  padding:20px 30px;
  font-size:18px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

/* 배지 */
.badge {
  display:inline-block;
  padding:9px 14px;
  border-radius:10px;
  color:white;
  font-weight:bold;
  margin-right:8px;
}

.mid { background:#facc15; color:black; }

/* meter */
.meter {
  height:16px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  margin-top:14px;
}

.bar {
  height:100%;
  background:linear-gradient(90deg,#22c55e,#facc15,#ef4444);
}

/* 뉴스 */
.news {
  margin-top:20px;
  padding:20px;
  border-left:6px solid #2563eb;
  background:#eef5ff;
  border-radius:10px;
}

/* ⭐ 중요 파란색 */
.important {
  color:#2563eb;
  font-weight:900;
}

/* 섹션 */
.section {
  margin-top:25px;
  padding:20px;
  border-left:5px solid #2563eb;
  background:#f8f9fa;
  border-radius:10px;
}

/* ⭐ 노란 별 */
.star {
  color:#facc15;
  font-weight:bold;
  margin-left:6px;
}

</style>
</head>

<body>

<div class="container">

<h1>🧐 AI 트렌드 브리핑</h1>

<div class="card">

<div class="search-box">
<input id="keyword"
placeholder="키워드를 입력하세요"
oninput="suggest(this.value)"
onblur="hideSuggest()">

<button onclick="analyze()">분석</button>

<div class="suggest-box" id="suggestBox"></div>
</div>

<div id="result"></div>

</div>
</div>

<script>

/* ================= 자동 추천 ================= */
function suggest(v){
  const box = document.getElementById("suggestBox");

  if(!v){
    box.style.display="none";
    return;
  }

  const list = [
    v+" 트렌드",
    v+" 수익",
    v+" 분석",
    v+" 전망"
  ];

  box.innerHTML = list.map(i =>
    `<div onclick="select('${i}')">${i}</div>`
  ).join("");

  box.style.display="block";
}

function select(v){
  document.getElementById("keyword").value = v;
  document.getElementById("suggestBox").style.display="none";
}

/* ✔ 다른 클릭 시 자동 종료 */
function hideSuggest(){
  setTimeout(()=>{
    document.getElementById("suggestBox").style.display="none";
  },150);
}

/* 점수 */
function score(){
  return Math.floor(Math.random()*40 + 60);
}

/* 뉴스 */
function news(keyword){
  return `
  <div class="news">
    <h3>📰 인터넷 화제성 분석 ★</h3>

    <p><span class="important">${keyword}</span>는 SNS / 유튜브 / 뉴스에서  
    <b class="important">급격한 언급 증가</b><span class="star">★</span></p>

    <p>짧은 영상 중심으로 확산 중이며  
    <b class="important">트렌드 상위 진입 가능성 높음</b><span class="star">★</span></p>
  </div>
  `;
}

/* 분석 */
function analyze(){

const keyword = document.getElementById("keyword").value.trim();
if(!keyword) return alert("입력하세요");

const s = score();

const result = document.getElementById("result");

result.innerHTML = `
<h2>🔍 <b>${keyword}</b></h2>

<span class="badge mid">🔥 ${s}점</span>

<div class="meter">
<div class="bar" style="width:${s}%"></div>
</div>

${news(keyword)}

<div class="section">
<h3>👥 핵심 관심<span class="star">★</span></h3>
<b class="important">• ${keyword} 활용 방법</b><br>
<b class="important">• 수익 구조 분석</b><br>
<b class="important">• 시장 전망</b><br>
</div>

<div class="section">
<h3>❓ 질문<span class="star">★</span></h3>
<b class="important">• 지금 시작해도 될까?</b><br>
<b class="important">• 돈이 될까?</b><br>
<b class="important">• 경쟁은 어떤가?</b><br>
</div>
`;

}

</script>

</body>
</html>
