<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🧐 AI 트렌드 분석기</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>

body {
  margin:0;
  background:#121212;
  color:white;
  font-family:Pretendard;
}

.container {
  max-width:1100px;
  margin:70px auto;
  padding:30px;
}

h1 {
  text-align:center;
  font-size:2.6rem;
  margin-bottom:30px;
}

.card {
  background:white;
  color:#222;
  padding:40px;
  border-radius:25px;
}

/* input */
.search-box {
  display:flex;
  gap:15px;
}

input {
  flex:1;
  padding:18px;
  font-size:18px;
  border-radius:12px;
  background:#1f1f1f;
  color:white;
  border:none;
}

button {
  padding:18px 28px;
  font-size:18px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

button:active {
  transform:scale(0.95);
}

/* badge */
.badge {
  display:inline-block;
  padding:8px 12px;
  border-radius:10px;
  color:white;
  font-weight:bold;
  margin-right:8px;
}

.low { background:#22c55e; }
.mid { background:#facc15; color:black; }
.high { background:#ef4444; }

/* meter */
.meter {
  height:14px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  margin-top:12px;
}

.bar {
  height:100%;
  transition:0.5s;
  background:linear-gradient(90deg,#22c55e,#facc15,#ef4444);
}

/* 섹션 */
.section {
  margin-top:22px;
  padding:15px;
  border-left:4px solid #2563eb;
}

/* 중요 텍스트 */
.highlight {
  font-weight:800;
  color:#2563eb;
}

/* 별 강조 */
.star {
  color:#facc15;
  font-weight:bold;
}

/* no data */
.no-data {
  background:#1f1f1f;
  border:2px solid #ff4d4d;
  padding:25px;
  border-radius:18px;
  text-align:center;
}

.no-data .title {
  font-size:20px;
  font-weight:bold;
  color:#ff4d4d;
}

.no-data .desc {
  color:#ffb4a2;
  font-size:14px;
  margin-top:6px;
}

</style>
</head>

<body>

<div class="container">

<h1>🧐 AI 트렌드 분석기</h1>

<div class="card">

<div class="search-box">
<input id="keyword" placeholder="키워드를 입력하세요">
<button onclick="analyze()">분석하기</button>
</div>

<div id="result"></div>

</div>
</div>

<script>

function scoreGen() {
  return Math.floor(Math.random()*40 + 60);
}

function level(score) {
  if(score < 70) return "low";
  if(score < 85) return "mid";
  return "high";
}

/* 🧠 뉴스 생성 (핵심 추가) */
function getNews(keyword) {

  return `
  <div class="section">
    <h3>📰 최신 화제성 분석 <span class="star">★</span></h3>

    <p><b>${keyword}</b> 관련 키워드는 최근 <span class="highlight">SNS / 유튜브 / 커뮤니티</span>에서 
    <b>언급량이 증가</b>하고 있는 주제입니다.</p>

    <p>특히 <b>20~30대 중심 콘텐츠 소비 증가</b>가 관측되며,
    <span class="highlight">짧은 영상(Shorts/Reels)</span>에서 확산 속도가 빠릅니다.</p>

    <p>최근 7일 기준 검색 트렌드는 <b>상승 흐름</b>이며,
    관련 콘텐츠 제작 수요도 증가 중입니다 <span class="star">★</span></p>
  </div>
  `;
}

function analyze() {

const keyword = document.getElementById("keyword").value.trim();
if(!keyword) return alert("입력하세요");

const score = scoreGen();
const lv = level(score);

let result = "";

if(keyword.includes("원룸")) {

result = `
<h2>🔍 ${keyword}</h2>

<span class="badge ${lv}">경쟁 ${lv === "low" ? "낮음" : lv === "mid" ? "중간" : "높음"}</span>
<span class="badge ${lv}">🔥 ${score}점</span>

<div class="meter">
<div class="bar" style="width:${score}%"></div>
</div>

${getNews(keyword)}

<div class="section">
<h3>👥 핵심 관심 ⭐</h3>
<b>• 원룸 인테리어</b><br>
<b>• 좁은 공간 활용</b><br>
<b>• 가성비 가구 추천</b><br>
</div>

<div class="section">
<h3>❓ 사람들이 궁금해하는 것 ⭐</h3>
<b>• 10만원으로 꾸밀 수 있을까?</b><br>
<b>• 수납 어떻게 하지?</b><br>
<b>• 좁은 방 넓어 보이게 하는 법?</b><br>
</div>
`;

}

else if(keyword.includes("AI")) {

result = `
<h2>🔍 ${keyword}</h2>

<span class="badge ${lv}">경쟁 ${lv === "low" ? "낮음" : lv === "mid" ? "중간" : "높음"}</span>
<span class="badge ${lv}">🔥 ${score}점</span>

<div class="meter">
<div class="bar" style="width:${score}%"></div>
</div>

${getNews(keyword)}

<div class="section">
<h3>❓ AI 질문 ⭐</h3>
<b>• AI 활용법</b><br>
<b>• 자동화 도구</b><br>
<b>• 영상 제작 AI</b><br>
</div>
`;

}

else {

result = `
<div class="no-data">
<div class="title">⚠️ 데이터 부족</div>
<div class="desc">아직 분석 데이터가 충분하지 않습니다</div>
</div>
`;

}

document.getElementById("result").innerHTML = result;
}

</script>

</body>
</html>
