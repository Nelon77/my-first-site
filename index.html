<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🧐 AI 트렌드 브리핑</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>

body {
  margin:0;
  background:#121212;
  color:white;
  font-family:Pretendard;
  font-size:18px;
}

.container {
  max-width:1200px;
  margin:80px auto;
  padding:30px;
}

h1 {
  text-align:center;
  font-size:2.8rem;
  margin-bottom:35px;
}

/* 카드 */
.card {
  background:white;
  color:#222;
  padding:50px;
  border-radius:28px;
}

/* 검색 */
.search-box {
  display:flex;
  gap:15px;
  position:relative;
}

input {
  flex:1;
  padding:20px;
  font-size:18px;
  border-radius:12px;
  background:#1f1f1f;
  color:white;
  border:none;

  text-align:center;
  font-weight:800;
}

/* 추천 박스 */
.suggest-box {
  position:absolute;
  top:70px;
  left:0;
  right:0;
  background:#222;
  border-radius:10px;
  display:none;
  overflow:hidden;
  z-index:10;
}

/* ⭐ 핵심 수정: 흰색 */
.suggest-box div {
  padding:12px;
  cursor:pointer;
  color:white;
}

.suggest-box div:hover {
  background:#333;
}

/* 버튼 */
button {
  padding:20px 30px;
  font-size:18px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

/* 배지 */
.badge {
  display:inline-block;
  padding:9px 14px;
  border-radius:10px;
  color:white;
  font-weight:bold;
  margin-right:8px;
}

.low { background:#22c55e; }
.mid { background:#facc15; color:black; }
.high { background:#ef4444; }

/* meter */
.meter {
  height:16px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  margin-top:14px;
}

.bar {
  height:100%;
  transition:0.5s;
  background:linear-gradient(90deg,#22c55e,#facc15,#ef4444);
}

/* 섹션 */
.section {
  margin-top:25px;
  padding:20px;
  border-left:5px solid #2563eb;
  background:#f8f9fa;
  border-radius:10px;
}

/* 🧠 중요 파란 강조 */
.important {
  color:#2563eb;
  font-weight:900;
}

/* ⭐ 별 강조 */
.star {
  color:#facc15;
  font-weight:bold;
}

/* 뉴스 (최상위 핵심) */
.news {
  border-left:6px solid #2563eb;
  background:#eef5ff;
  padding:20px;
  border-radius:10px;
  margin-top:20px;
}

/* no data */
.no-data {
  background:#1f1f1f;
  border:2px solid #ff4d4d;
  padding:30px;
  border-radius:18px;
  text-align:center;
}

.no-data .title {
  font-size:22px;
  font-weight:bold;
  color:#ff4d4d;
}

.no-data .desc {
  color:#ffb4a2;
  font-size:15px;
  margin-top:6px;
}

</style>
</head>

<body>

<div class="container">

<h1>🧐 AI 트렌드 브리핑</h1>

<div class="card">

<div class="search-box">
<input id="keyword"
placeholder="키워드를 입력하세요"
oninput="suggest(this.value)"
onblur="hideSuggest()">

<button onclick="analyze()">분석</button>

<div class="suggest-box" id="suggestBox"></div>
</div>

<div id="result"></div>

</div>
</div>

<script>

/* ================= 추천 ================= */
function suggest(v){
  const box = document.getElementById("suggestBox");

  if(!v){
    box.style.display="none";
    return;
  }

  const list = [
    v+" 트렌드",
    v+" 수익",
    v+" 분석",
    v+" 전망"
  ];

  box.innerHTML = list.map(i =>
    `<div onclick="select('${i}')">${i}</div>`
  ).join("");

  box.style.display="block";
}

function select(v){
  document.getElementById("keyword").value = v;
  document.getElementById("suggestBox").style.display="none";
}

/* ⭐ 핵심 수정: 다른 클릭 시 자동 숨김 */
function hideSuggest(){
  setTimeout(()=>{
    document.getElementById("suggestBox").style.display="none";
  },150);
}

/* 점수 */
function score(){
  return Math.floor(Math.random()*40 + 60);
}

/* 📰 화제성 (최상위 중요 섹션) */
function news(keyword){
  return `
  <div class="news">
    <h3>📰 인터넷 화제성 분석 ★</h3>

    <p><span class="important">${keyword}</span>는 현재  
    <span class="important">SNS / 유튜브 / 뉴스</span> 전반에서  
    <b>급격한 언급 증가</b>가 나타나는 키워드입니다 ⭐</p>

    <p>특히 <span class="important">짧은 영상 콘텐츠</span> 중심으로 확산되며  
    <b>트렌드 상위권 진입 가능성</b>이 높습니다 ⭐</p>

    <p><b>핵심 요약:</b> <span class="important">현재 화제성 상승 구간</span> ⭐</p>
  </div>
  `;
}

/* 분석 */
function analyze(){

const keyword = document.getElementById("keyword").value.trim();
if(!keyword) return alert("입력하세요");

const result = document.getElementById("result");

const s = score();

result.innerHTML = `
<h2>🔍 <b>${keyword}</b></h2>

<span class="badge mid">🔥 ${s}점</span>

<div class="meter">
<div class="bar" style="width:${s}%"></div>
</div>
`;

/* 📰 핵심 화제성 */
result.innerHTML += news(keyword);

/* 관심 */
result.innerHTML += `
<div class="section">
<h3>👥 핵심 관심 ⭐</h3>
<b class="important">• ${keyword} 활용 방법</b><br>
<b class="important">• 수익 구조 분석</b><br>
<b class="important">• 시장 확장성</b><br>
</div>
`;

/* 질문 */
result.innerHTML += `
<div class="section">
<h3>❓ 사람들이 궁금해하는 것 ⭐</h3>
<b class="important">• 지금 시작해도 될까?</b><br>
<b class="important">• 돈이 될까?</b><br>
<b class="important">• 경쟁이 심한가?</b><br>
</div>
`;

}

</script>

</body>
</html>
