<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧐 AI 트렌드 브리핑</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>

body{
  margin:0;
  background:#121212;
  color:white;
  font-family:Pretendard;
}

.container{
  max-width:1200px;
  margin:70px auto;
  padding:30px;
}

h1{
  text-align:center;
  font-size:2.7rem;
  margin-bottom:30px;
}

.card{
  background:white;
  color:#222;
  padding:45px;
  border-radius:25px;
}

/* 검색 */
.search-box{
  display:flex;
  gap:10px;
}

input{
  flex:1;
  padding:18px;
  font-size:18px;
  border-radius:10px;
  background:#1f1f1f;
  color:white;
  border:none;
  text-align:center;
  font-weight:700;
}

button{
  padding:18px 26px;
  font-size:18px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* 점수 */
.score{
  color:black;
  font-weight:900;
  font-size:18px;
}

/* 배지 */
.badge{
  display:inline-block;
  padding:8px 12px;
  border-radius:10px;
  color:white;
  font-weight:bold;
}

/* 게이지 */
.meter{
  height:16px;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}

.bar{
  height:100%;
  transition:0.5s;
}

/* 섹션 */
.section{
  margin-top:20px;
  padding:15px;
  border-left:4px solid #2563eb;
  background:#f5f7ff;
  border-radius:10px;
}

/* 강조 */
.highlight{
  font-weight:900;
  color:#2563eb;
}

/* 별 */
.star{
  color:#facc15;
}

/* no data */
.no-data{
  background:#111;
  border:2px solid #ff4d4d;
  padding:25px;
  border-radius:15px;
  text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h1>🧐 AI 트렌드 브리핑</h1>

<div class="card">

<div class="search-box">
<input id="keyword" placeholder="키워드를 입력하세요">
<button onclick="analyze()">분석</button>
</div>

<div id="result"></div>

</div>
</div>

<script>

/* 🔥 점수 생성 */
function score(keyword){
  let base = 50;

  for(let i=0;i<keyword.length;i++){
    base += keyword.charCodeAt(i)%20;
  }

  return Math.min(100, Math.max(5, base));
}

/* 🎨 점수 → 색 */
function getColor(s){
  if(s<=15) return "#0a8f3c";
  if(s<=30) return "#7ddc6f";
  if(s<=45) return "#facc15";
  if(s<=60) return "#f59e0b";
  if(s<=75) return "#f97316";
  if(s<=85) return "#ea580c";
  return "#ef4444";
}

/* 📅 최근 7일 */
function getDateRange(){
  const end = new Date();
  const start = new Date();
  start.setDate(end.getDate()-6);

  return `${start.toLocaleDateString()} ~ ${end.toLocaleDateString()}`;
}

/* 📰 화제성 */
function newsBlock(keyword){

  return `
  <div class="section">

    <h3>📰 인터넷 화제성 분석 <span class="star">⭐</span></h3>

    <small style="color:#444;">
      (${getDateRange()})
    </small>

    <p><b><span class="highlight">${keyword}</span></b> 관련 키워드는 최근 7일간 SNS, 유튜브, 커뮤니티에서 꾸준히 언급되고 있습니다.</p>

    <p>특히 <b>짧은 콘텐츠 중심 확산</b>이 강하며, 검색량과 관심도가 함께 유지되는 흐름입니다.</p>

    <p>전체적으로 화제성은 <b>중~상위 수준</b>으로 분석됩니다.</p>

  </div>
  `;
}

/* 👥 관심 */
function interest(keyword){
  return `
  <div class="section">
    <h3>👥 핵심 관심</h3>
    <b>• ${keyword} 활용 방법</b><br>
    <b>• 실사용 사례</b><br>
    <b>• 시장 반응</b><br>
  </div>
  `;
}

/* ❓ 질문 */
function question(keyword){
  return `
  <div class="section">
    <h3>❓ 사람들이 궁금해하는 것</h3>
    <b>• 왜 ${keyword}가 인기인가?</b><br>
    <b>• 지금 시작해도 되는가?</b><br>
    <b>• 수익성이 있는가?</b><br>
  </div>
  `;
}

/* 🚀 분석 */
function analyze(){

const k = document.getElementById("keyword").value.trim();
if(!k) return alert("입력하세요");

const s = score(k);
const color = getColor(s);

document.getElementById("result").innerHTML = `

<h2>🔍 <b style="color:#2563eb">${k}</b></h2>

<div>
  <span class="score">🔥 ${s}점</span>
</div>

<div class="meter">
  <div class="bar" style="width:${s}%; background:${color}"></div>
</div>

${newsBlock(k)}
${interest(k)}
${question(k)}

`;

}

</script>

</body>
</html>
