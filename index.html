<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🧐 AI 트렌드 브리핑</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>

body{
  margin:0;
  background:#121212;
  color:white;
  font-family:Pretendard;
  font-size:18px;
}

.container{
  max-width:1100px;
  margin:70px auto;
  padding:30px;
}

h1{
  text-align:center;
  font-size:2.7rem;
  margin-bottom:30px;
}

.card{
  background:white;
  color:#222;
  padding:45px;
  border-radius:24px;
}

.search-box{
  display:flex;
  gap:15px;
}

input{
  flex:1;
  padding:18px;
  font-size:18px;
  border-radius:12px;
  background:#1f1f1f;
  color:white;
  border:none;
  text-align:center;
  font-weight:700;
}

button{
  padding:18px 26px;
  font-size:18px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

/* ===== 게이지 ===== */
.meter{
  height:16px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  margin-top:15px;
}

.bar{
  height:100%;
  transition:0.5s;
}

/* 배지 */
.badge{
  display:inline-block;
  padding:8px 12px;
  border-radius:10px;
  color:white;
  font-weight:bold;
  margin-right:8px;
}

/* 섹션 */
.section{
  margin-top:22px;
  padding:18px;
  border-radius:10px;
  background:#f7f9fc;
  border-left:5px solid #2563eb;
}

/* 강조 (과도하지 않게) */
.emph{
  color:#2563eb;
  font-weight:800;
}

/* 작은 날짜 */
.small-date{
  font-size:12px;
  color:#111;
  margin-top:4px;
}

/* no data */
.no-data{
  background:#1f1f1f;
  border:2px solid #ff4d4d;
  padding:25px;
  border-radius:18px;
  text-align:center;
}

.no-data .title{
  font-size:20px;
  font-weight:bold;
  color:#ff4d4d;
}

.no-data .desc{
  color:#ffb4a2;
  font-size:14px;
}

/* 구분선 */
hr{
  border:none;
  border-top:1px solid #ddd;
  margin:20px 0;
}

</style>
</head>

<body>

<div class="container">

<h1>🧐 AI 트렌드 브리핑</h1>

<div class="card">

<div class="search-box">
<input id="keyword" placeholder="키워드를 입력하세요">
<button onclick="analyze()">분석</button>
</div>

<div id="result"></div>

</div>
</div>

<script>

/* ===== 1. 안정된 점수 (7일 고정) ===== */
function getScore(keyword){
  let hash = 0;
  for(let i=0;i<keyword.length;i++){
    hash = (hash * 31 + keyword.charCodeAt(i)) % 100;
  }

  const daySeed = Math.floor(Date.now() / (1000*60*60*24*7));
  return (hash + daySeed) % 101;
}

/* ===== 2. 색상 매핑 (요구사항 그대로) ===== */
function getColor(score){

  if(score <= 15) return "#0b6623";      // 진한 초록
  if(score <= 30) return "#66bb6a";      // 연두
  if(score <= 45) return "#fdd835";      // 노랑
  if(score <= 60) return "#ffb300";      // 노랑-주황
  if(score <= 75) return "#fb8c00";      // 주황
  if(score <= 85) return "#ef6c00";      // 진한 주황
  return "#e53935";                      // 빨강
}

/* ===== 3. 날짜 ===== */
function getDateText(){
  const d = new Date();
  return d.toLocaleDateString("ko-KR");
}

/* ===== 4. 화제성 (고정 구조) ===== */
function getTrendSection(){

  return `
  <div class="section">
    <h3>📰 인터넷 화제성 분석 ⭐</h3>
    <div class="small-date">(최근 7일 기준 / ${getDateText()})</div>

    <p>
    최근 해당 키워드는 <b>검색량 변화와 SNS 언급량</b> 기준으로 분석되며,<br>
    <span class="emph">콘텐츠 소비 증가 흐름</span>이 관측됩니다.
    </p>

    <p>
    특히 <b>짧은 영상 플랫폼</b> 중심으로 확산 속도가 빨라지고 있으며,<br>
    커뮤니티 반응 또한 <span class="emph">점진적 상승 패턴</span>을 보입니다.
    </p>

    <p>
    종합적으로 <b>중간 이상 화제성</b>을 가진 주제로 분류됩니다.
    </p>
  </div>
  `;
}

/* ===== 5. 핵심 관심 ===== */
function getInterest(){

  return `
  <div class="section">
    <h3>📌 핵심 관심 ⭐</h3>

    <p><b class="emph">실제 활용 가능성</b> 중심으로 분석됩니다.</p>

    • 활용 방법 확장성<br>
    • 실생활 적용 가능성<br>
    • 콘텐츠 제작 활용도<br>
  </div>
  `;
}

/* ===== 6. 질문 ===== */
function getQuestions(){

  return `
  <div class="section">
    <h3>❓ 사람들이 궁금해하는 것 ⭐</h3>

    • 지금 시작해도 늦지 않을까?<br>
    • 실제 수익이 발생할까?<br>
    • 경쟁 강도는 어떤 수준일까?<br>
  </div>
  `;
}

/* ===== 7. 분석 ===== */
function analyze(){

const keyword = document.getElementById("keyword").value.trim();
if(!keyword) return alert("입력하세요");

const score = getScore(keyword);
const color = getColor(score);

let result = `
<h2>🔍 ${keyword}</h2>

<span class="badge" style="background:${color}">
🔥 ${score}점
</span>

<div class="meter">
<div class="bar" style="width:${score}%; background:${color}"></div>
</div>

<hr>
`;

/* 항상 고정 구조 */
result += getTrendSection();
result += getInterest();
result += getQuestions();

document.getElementById("result").innerHTML = result;

}

</script>

</body>
</html>
