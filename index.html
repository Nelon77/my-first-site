<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🧐 AI 키워드 검색·분석기</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#121212;
  color:white;
  font-family:Pretendard,sans-serif;
}

.container{
  max-width:1200px;
  margin:70px auto;
  padding:30px;
}

h1{
  text-align:center;
  font-size:2.7rem;
  margin-bottom:10px;
}

.subtitle{
  text-align:center;
  color:#bdbdbd;
  font-size:15px;
  margin-bottom:30px;
}

.card{
  background:white;
  color:#222;
  padding:45px;
  border-radius:25px;
}

.search-box{
  display:flex;
  gap:10px;
}

input{
  flex:1;
  padding:18px;
  font-size:18px;
  border-radius:10px;
  background:#1f1f1f;
  color:white;
  border:none;
  text-align:center;
  font-weight:700;
}

input::placeholder{
  color:#bdbdbd;
}

button{
  padding:18px 26px;
  font-size:18px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
  transition:.2s;
}

button:hover{
  background:#1d4ed8;
}

button:disabled{
  background:#94a3b8;
  cursor:not-allowed;
}

.badge{
  display:inline-block;
  padding:10px 14px;
  border-radius:12px;
  color:black;
  font-weight:900;
}

.meter{
  height:16px;
  background:#e5e7eb;
  border-radius:10px;
  overflow:hidden;
  margin-top:15px;
}

.bar{
  height:100%;
  transition:all .5s ease;
}

.section{
  margin-top:24px;
  padding:20px;
  border-left:4px solid #2563eb;
  background:#f5f7ff;
  border-radius:12px;
}

.section h3{
  margin-top:0;
  margin-bottom:8px;
}

.highlight{
  font-weight:900;
  color:#2563eb;
}

.star{
  color:#facc15;
}

.loading{
  color:#2563eb;
  font-size:18px;
  font-weight:800;
  margin-top:20px;
}

.no-data{
  background:#111;
  color:white;
  border:2px solid #ff4d4d;
  padding:25px;
  border-radius:15px;
  text-align:center;
  margin-top:20px;
}

ul{
  padding-left:20px;
}

li{
  margin-bottom:10px;
  line-height:1.8;
}

.date{
  color:#555;
  font-size:13px;
  margin-bottom:10px;
}

.section p{
  line-height:1.9;
  word-break:keep-all;
}

@media(max-width:768px){

  .container{
    padding:18px;
    margin:30px auto;
  }

  .card{
    padding:24px;
  }

  h1{
    font-size:2rem;
  }

  .search-box{
    flex-direction:column;
  }

  button{
    width:100%;
  }

}

</style>
</head>

<body>

<div class="container">

  <h1>🧐 AI 키워드 검색·분석기</h1>

  <p class="subtitle">
    최근 7일간 뉴스·SNS·커뮤니티 데이터를 AI가 분석합니다
  </p>

  <div class="card">

    <div class="search-box">

      <input
        id="keyword"
        type="text"
        placeholder="검색할 키워드를 입력하세요"
        autocomplete="off"
      >

      <button id="analyzeBtn" onclick="analyze()">
        분석
      </button>

    </div>

    <div id="result"></div>

  </div>

</div>

<script>

function getColor(score){

  if(score <= 15) return "#0a8f3c";
  if(score <= 30) return "#7ddc6f";
  if(score <= 45) return "#facc15";
  if(score <= 60) return "#f59e0b";
  if(score <= 75) return "#f97316";
  if(score <= 85) return "#ea580c";

  return "#ef4444";
}

function getDateRange(){

  const end = new Date();
  const start = new Date();

  start.setDate(end.getDate() - 6);

  const format = (date) => {

    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2,"0");
    const d = String(date.getDate()).padStart(2,"0");

    return `${y}.${m}.${d}`;
  };

  return `${format(start)} ~ ${format(end)}`;
}

async function analyze(){

  const keyword = document
    .getElementById("keyword")
    .value
    .trim();

  if(!keyword){
    alert("키워드를 입력하세요.");
    return;
  }

  const result = document.getElementById("result");
  const button = document.getElementById("analyzeBtn");

  button.disabled = true;
  button.innerText = "분석 중...";

  result.innerHTML = `
    <div class="loading">
      🔄 AI가 최근 7일 데이터를 분석 중입니다...
    </div>
  `;

  try{

    const response = await fetch(
      `/api/analyze?keyword=${encodeURIComponent(keyword)}`
    );

    const data = await response.json();

    if(!response.ok){
      throw new Error(data.error || "API 오류");
    }

    const score = data.score ?? 50;
    const color = getColor(score);

    const trend = data.trend ?? "분석 데이터가 없습니다.";
    const summary = data.summary ?? "분석 데이터가 없습니다.";
    const questions = data.questions ?? [];

    result.innerHTML = `

      <h2>
        🔍 <span class="highlight">${keyword}</span>
      </h2>

      <div style="margin:18px 0;">

        <span
          class="badge"
          style="background:${color};"
        >
          🔥 ${score}점
        </span>

      </div>

      <div class="meter">

        <div
          class="bar"
          style="
            width:${score}%;
            background:${color};
          "
        ></div>

      </div>

      <div class="section">

        <h3>
          📰 인터넷 화제성 분석
          <span class="star">⭐</span>
        </h3>

        <div class="date">
          (${getDateRange()})
        </div>

        <p>${summary}</p>

      </div>

      <div class="section">

        <h3>
          📈 핵심 관심사
          <span class="star">⭐</span>
        </h3>

        <p>${trend}</p>

      </div>

      <div class="section">

        <h3>
          ❓ 사람들이 궁금해하는 것
          <span class="star">⭐</span>
        </h3>

        ${
          questions.length
            ? `<ul>${questions.map(q => `<li>${q}</li>`).join("")}</ul>`
            : `<p>관련 질문 데이터가 없습니다.</p>`
        }

      </div>

    `;

  }catch(error){

    console.error(error);

    result.innerHTML = `
      <div class="no-data">
        ⚠️ 분석 중 오류가 발생했습니다.
        <br><br>
        ${error.message}
      </div>
    `;

  }finally{

    button.disabled = false;
    button.innerText = "분석";
  }
}

document
  .getElementById("keyword")
  .addEventListener("keypress", function(event){

    if(event.key === "Enter"){
      analyze();
    }

  });

</script>

</body>
</html>
