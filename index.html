<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🧐 AI 트렌드 브리핑</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>

body {
  margin:0;
  background:#121212;
  color:white;
  font-family:Pretendard;
  font-size:18px;
}

.container {
  max-width:1200px;
  margin:80px auto;
  padding:30px;
}

h1 {
  text-align:center;
  font-size:2.8rem;
  margin-bottom:35px;
}

/* 카드 */
.card {
  background:white;
  color:#222;
  padding:50px;
  border-radius:28px;
}

/* 검색 */
.search-box {
  display:flex;
  gap:15px;
  position:relative;
}

input {
  flex:1;
  padding:20px;
  font-size:18px;
  border-radius:12px;
  background:#1f1f1f;
  color:white;
  border:none;

  text-align:center;
  font-weight:800;
}

/* 추천 */
.suggest-box {
  position:absolute;
  top:70px;
  left:0;
  right:0;
  background:#222;
  border-radius:10px;
  display:none;
  overflow:hidden;
  z-index:10;
}

.suggest-box div {
  padding:12px;
  cursor:pointer;
}

.suggest-box div:hover {
  background:#333;
}

/* 버튼 */
button {
  padding:20px 30px;
  font-size:18px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

/* 배지 */
.badge {
  display:inline-block;
  padding:9px 14px;
  border-radius:10px;
  color:white;
  font-weight:bold;
  margin-right:8px;
}

.low { background:#22c55e; }
.mid { background:#facc15; color:black; }
.high { background:#ef4444; }

/* meter */
.meter {
  height:16px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  margin-top:14px;
}

.bar {
  height:100%;
  transition:0.5s;
  background:linear-gradient(90deg,#22c55e,#facc15,#ef4444);
}

/* 섹션 */
.section {
  margin-top:25px;
  padding:18px;
  border-left:5px solid #2563eb;
  background:#f8f9fa;
  border-radius:10px;
}

/* 강조 */
.highlight {
  font-weight:900;
  color:#2563eb;
}

.star {
  color:#facc15;
  font-weight:bold;
}

/* 로딩 */
.loading {
  color:#2563eb;
  font-weight:bold;
  margin-top:15px;
}

/* 🦖 공룡 */
.dino {
  display:none;
  text-align:center;
  font-size:70px;
  margin-top:20px;
  animation:bounce 0.7s infinite;
}

.dino span {
  display:block;
  font-size:16px;
  color:#3b82f6;
  font-weight:900;
}

@keyframes bounce {
  0%,100% { transform:translateY(0); }
  50% { transform:translateY(-12px); }
}

/* 타이핑 */
.typing {
  display:inline-block;
  border-right:2px solid #333;
  margin:5px 0;
}

</style>
</head>

<body>

<div class="container">

<h1>🧐 AI 트렌드 브리핑</h1>

<div class="card">

<div class="search-box">
<input id="keyword" placeholder="키워드를 입력하세요"
oninput="suggest(this.value)">
<button onclick="analyze()">분석</button>

<div class="suggest-box" id="suggestBox"></div>
</div>

<!-- 🦖 공룡 로딩 -->
<div id="dino" class="dino">
🦖
<span>기다려 주시오!!</span>
</div>

<div id="result"></div>

</div>
</div>

<script>

/* ================= 추천 ================= */
function suggest(v){
  const box = document.getElementById("suggestBox");

  if(!v){
    box.style.display="none";
    return;
  }

  const list = [
    v+" 트렌드",
    v+" 수익",
    v+" 분석",
    v+" 전망"
  ];

  box.innerHTML = list.map(i =>
    `<div onclick="select('${i}')">${i}</div>`
  ).join("");

  box.style.display="block";
}

function select(v){
  document.getElementById("keyword").value = v;
  document.getElementById("suggestBox").style.display="none";
}

/* ================= 점수 ================= */
function score(){
  return Math.floor(Math.random()*40 + 60);
}

/* ================= 뉴스 ================= */
function news(keyword){
  return `
  <div class="section">
    <h3>📰 화제성 분석 ★</h3>
    <p><b>${keyword}</b>는 SNS / 유튜브 / 커뮤니티에서 빠르게 확산 중입니다.</p>
    <p>검색량은 <b>상승 추세</b>이며 콘텐츠 수요도 증가 중 ★</p>
  </div>
  `;
}

/* ================= 스트리밍 ================= */
function stream(el, arr, i=0){
  if(i>=arr.length) return;

  el.innerHTML += `<div class="typing">${arr[i]}</div><br>`;

  setTimeout(()=>stream(el, arr, i+1), 500);
}

/* ================= 분석 ================= */
function analyze(){

const keyword = document.getElementById("keyword").value.trim();
if(!keyword) return alert("입력하세요");

const result = document.getElementById("result");
const dino = document.getElementById("dino");

/* 초기 */
result.innerHTML = `<div class="loading">🧠 분석 중...</div>`;

/* 🦖 공룡 조건 */
const heavy = keyword.length > 5 || Math.random() > 0.6;

if(heavy){
  dino.style.display = "block";
}

setTimeout(()=>{

const s = score();

result.innerHTML = `
<h2>🔍 <b>${keyword}</b></h2>

<span class="badge mid">🔥 ${s}점</span>

<div class="meter">
<div class="bar" style="width:${s}%"></div>
</div>

<div id="stream"></div>
`;

const streamBox = document.getElementById("stream");

stream(streamBox, [
"🧠 데이터 수집 중...",
"📊 SNS 분석 중...",
"🔥 화제성 계산 중...",
"✔ 완료!"
]);

setTimeout(()=>{

dino.style.display="none";

streamBox.innerHTML += news(keyword);

streamBox.innerHTML += `
<div class="section">
<h3>👥 핵심 관심 ★</h3>
<b>• ${keyword} 활용</b><br>
<b>• 수익 구조</b><br>
<b>• 시장 전망</b><br>
</div>

<div class="section">
<h3>❓ 질문 ★</h3>
<b>• 지금 시작해도 될까?</b><br>
<b>• 돈이 될까?</b><br>
<b>• 경쟁은 어떤가?</b><br>
</div>
`;

}, 2200);

}, 700);

}

</script>

</body>
</html>
