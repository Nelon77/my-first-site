<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🧐 AI 트렌드 브리핑</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>

body {
  margin:0;
  background:#121212;
  color:white;
  font-family:Pretendard;
  font-size:18px;
}

.container {
  max-width:1200px;
  margin:80px auto;
  padding:30px;
}

h1 {
  text-align:center;
  font-size:2.8rem;
  margin-bottom:35px;
}

.card {
  background:white;
  color:#222;
  padding:50px;
  border-radius:28px;
}

/* input */
.search-box {
  display:flex;
  gap:15px;
}

input {
  flex:1;
  padding:20px;
  font-size:18px;
  border-radius:12px;
  background:#1f1f1f;
  color:white;
  border:none;
  text-align:center;
  font-weight:800;
}

/* 버튼 */
button {
  padding:20px 30px;
  font-size:18px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

/* 배지 */
.badge {
  display:inline-block;
  padding:9px 14px;
  border-radius:10px;
  color:white;
  font-weight:bold;
  margin-right:8px;
}

.mid { background:#facc15; color:black; }

/* meter */
.meter {
  height:16px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  margin-top:14px;
}

.bar {
  height:100%;
  background:linear-gradient(90deg,#22c55e,#facc15,#ef4444);
}

/* 뉴스 */
.news {
  margin-top:20px;
  padding:20px;
  border-left:6px solid #2563eb;
  background:#eef5ff;
  border-radius:10px;
}

/* ⭐ */
.star {
  color:#facc15;
  font-weight:bold;
  margin-left:6px;
}

/* 섹션 */
.section {
  margin-top:25px;
  padding:20px;
  border-left:5px solid #ddd;
  background:#f8f9fa;
  border-radius:10px;
}

/* 🔵 강조 */
.blue {
  color:#2563eb;
  font-weight:900;
}

/* 제목 */
h3 {
  margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>🧐 AI 트렌드 브리핑</h1>

<div class="card">

<div class="search-box">
<input id="keyword" placeholder="키워드를 입력하세요">
<button onclick="analyze()">분석</button>
</div>

<div id="result"></div>

</div>
</div>

<script>

function score(){
  return Math.floor(Math.random()*40 + 60);
}

function removeKeywordHighlight(text, keyword){
  if(!keyword) return text;

  // 🔥 keyword가 있으면 절대 강조하지 않도록 치환
  const regex = new RegExp(keyword, "g");
  return text.replace(regex, keyword);
}

/* 뉴스 */
function news(keyword){
  let text = `
  <div class="news">
    <h3>📰 인터넷 화제성 분석<span class="star">★</span></h3>

    <p>${keyword}는 현재 SNS / 뉴스 / 유튜브에서 빠르게 확산 중입니다.</p>

    <p><b>짧은 영상 중심 확산</b> + <b>검색량 상승</b>이 동시에 나타나는 중입니다.</p>
  </div>
  `;

  return removeKeywordHighlight(text, keyword);
}

/* 핵심 관심 */
function interest(keyword){
  let text = `
  <div class="section">
    <h3>👥 핵심 관심<span class="star">★</span></h3>
    <b>• ${keyword} 활용 방법</b><br>
    <b>• 수익 구조 분석</b><br>
    <b>• 시장 전망</b><br>
  </div>
  `;

  return removeKeywordHighlight(text, keyword);
}

/* 질문 */
function questions(keyword){
  let text = `
  <div class="section">
    <h3>❓ 사람들이 궁금해하는 것<span class="star">★</span></h3>
    <b>• 지금 시작해도 될까?</b><br>
    <b>• 돈이 될까?</b><br>
    <b>• 경쟁은 어떤가?</b><br>
  </div>
  `;

  return removeKeywordHighlight(text, keyword);
}

/* 분석 */
function analyze(){

const keyword = document.getElementById("keyword").value.trim();
if(!keyword) return alert("입력하세요");

const s = score();

const result = document.getElementById("result");

result.innerHTML = `
<h2>🔍 <b>${keyword}</b></h2>

<span class="badge mid">🔥 ${s}점</span>

<div class="meter">
<div class="bar" style="width:${s}%"></div>
</div>

${news(keyword)}
${interest(keyword)}
${questions(keyword)}
`;

}

</script>

</body>
</html>
