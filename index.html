<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🧐 AI 트렌드 브리핑</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>

body {
  margin:0;
  background:#121212;
  color:white;
  font-family:Pretendard;
  font-size:18px;
}

.container {
  max-width:1100px;
  margin:80px auto;
  padding:30px;
}

h1 {
  text-align:center;
  font-size:2.8rem;
  margin-bottom:35px;
}

.card {
  background:white;
  color:#222;
  padding:45px;
  border-radius:28px;
}

/* 입력 */
.search-box {
  display:flex;
  gap:15px;
}

input {
  flex:1;
  padding:20px;
  font-size:18px;
  border-radius:12px;
  background:#1f1f1f;
  color:white;
  border:none;
  text-align:center;
  font-weight:700;
}

input::placeholder {
  color:#888;
  text-align:center;
}

/* 버튼 */
button {
  padding:20px 30px;
  font-size:18px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

button:active {
  transform:scale(0.95);
}

/* 배지 (점수 색 연동) */
.badge {
  display:inline-block;
  padding:10px 14px;
  border-radius:10px;
  font-weight:800;
  margin-right:8px;
  color:white;
}

/* 게이지 */
.meter {
  height:16px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  margin-top:14px;
}

.bar {
  height:100%;
  transition:0.4s;
}

/* 섹션 */
.section {
  margin-top:22px;
  padding:18px;
  border-left:5px solid #2563eb;
  background:#f8f9fa;
  border-radius:10px;
}

/* 제목 */
.section h3 {
  margin-bottom:10px;
}

/* 중요 표시 */
.star {
  color:#facc15;
  font-weight:bold;
}

/* 날짜 */
.date {
  font-size:12px;
  color:#000;
  margin-top:-6px;
  margin-bottom:10px;
}

/* 리스트 */
.section b {
  color:#111;
  font-weight:800;
}

/* no data */
.no-data {
  background:#1f1f1f;
  border:2px solid #ff4d4d;
  padding:30px;
  border-radius:18px;
  text-align:center;
}

.no-data .title {
  font-size:20px;
  font-weight:bold;
  color:#ff4d4d;
}

.no-data .desc {
  color:#ffb4a2;
  font-size:14px;
  margin-top:6px;
}

</style>
</head>

<body>

<div class="container">

<h1>🧐 AI 트렌드 브리핑</h1>

<div class="card">

<div class="search-box">
<input id="keyword" placeholder="키워드를 입력하세요">
<button onclick="analyze()">분석</button>
</div>

<div id="result"></div>

</div>
</div>

<script>

/////////////////////////////
// 🔥 해시 기반 점수 고정
/////////////////////////////
function hashScore(str){
  let hash = 0;
  for(let i=0;i<str.length;i++){
    hash = (hash * 31 + str.charCodeAt(i)) % 101;
  }
  return hash;
}

function getScore(keyword){
  // 7일 기준 “고정 트렌드 값”
  return hashScore(keyword);
}

/////////////////////////////
// 🎨 점수 → 색상
/////////////////////////////
function getColor(score){

  if(score <= 15) return "#0b6623";      // 진한 초록
  if(score <= 30) return "#7ed957";      // 연두
  if(score <= 45) return "#facc15";      // 노랑
  if(score <= 60) return "#fbbf24";      // 노랑-주황
  if(score <= 75) return "#f97316";      // 주황
  if(score <= 85) return "#ea580c";      // 진한 주황
  return "#ef4444";                      // 빨강
}

/////////////////////////////
// 📰 화제성 (고정 구조)
/////////////////////////////
function getNews(score){

  let trend =
    score > 70 ? "급상승" :
    score > 45 ? "상승" : "보통";

  return `
  <div class="section">
    <h3>📰 인터넷 화제성 분석 <span class="star">★</span></h3>
    <div class="date">(최근 7일 기준 / ${new Date().toLocaleDateString()})</div>

    <p>현재 해당 키워드는 <b>${trend}</b> 흐름을 보이고 있으며,
    SNS / 유튜브 / 커뮤니티에서 언급량 변화가 감지됩니다.</p>

    <p>특히 짧은 영상 콘텐츠 중심으로 확산되는 패턴이 나타나고 있으며,
    검색 기반 관심도도 함께 움직이고 있습니다 <span class="star">★</span></p>
  </div>
  `;
}

/////////////////////////////
// 👥 핵심 관심
/////////////////////////////
function getInterest(){
  return `
  <div class="section">
    <h3>👥 핵심 관심 <span class="star">★</span></h3>

    <b>• 기본 개념 이해</b><br>
    <b>• 활용 방법</b><br>
    <b>• 실제 적용 사례</b><br>
  </div>
  `;
}

/////////////////////////////
// ❓ 질문
/////////////////////////////
function getQuestions(){
  return `
  <div class="section">
    <h3>❓ 사람들이 궁금해하는 것 <span class="star">★</span></h3>

    <b>• 지금 시작해도 늦지 않을까?</b><br>
    <b>• 수익이 발생할 수 있을까?</b><br>
    <b>• 경쟁은 어떤 수준일까?</b><br>
  </div>
  `;
}

/////////////////////////////
// 🚀 분석 실행
/////////////////////////////
function analyze(){

  const keyword = document.getElementById("keyword").value.trim();
  if(!keyword) return alert("입력하세요");

  const score = getScore(keyword);
  const color = getColor(score);

  let result = `
    <h2>🔍 ${keyword}</h2>

    <span class="badge" style="background:${color}">
      🔥 ${score}점
    </span>

    <div class="meter">
      <div class="bar" style="width:${score}%; background:${color}"></div>
    </div>
  `;

  result += getNews(score);
  result += getInterest();
  result += getQuestions();

  document.getElementById("result").innerHTML = result;
}

</script>

</body>
</html>
