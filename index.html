<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🧐 AI 트렌드 브리핑</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>

body {
  margin:0;
  background:#121212;
  color:white;
  font-family:Pretendard;
  font-size:18px;
}

.container {
  max-width:1200px;
  margin:80px auto;
  padding:30px;
}

h1 {
  text-align:center;
  font-size:2.8rem;
  margin-bottom:35px;
}

.card {
  background:white;
  color:#222;
  padding:50px;
  border-radius:28px;
}

/* 입력 */
.search-box {
  display:flex;
  gap:15px;
}

input {
  flex:1;
  padding:20px;
  font-size:18px;
  border-radius:12px;
  background:#1f1f1f;
  color:white;
  border:none;
  text-align:center;
  font-weight:700;
}

button {
  padding:20px 30px;
  font-size:18px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

button:active {
  transform:scale(0.95);
}

/* 점수 배지 */
.badge {
  display:inline-block;
  padding:10px 14px;
  border-radius:10px;
  color:white;
  font-weight:bold;
  margin-right:8px;
}

/* 게이지 */
.meter {
  height:16px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  margin-top:14px;
}

.bar {
  height:100%;
  transition:0.5s;
}

/* 섹션 */
.section {
  margin-top:25px;
  padding:18px;
  border-radius:12px;
  background:#f5f9ff;
  border-left:5px solid #2563eb;
}

/* 소제목 */
.section h3 {
  margin-bottom:10px;
  font-weight:900;
  color:#111;
}

/* 중요 텍스트 */
.highlight {
  font-weight:800;
  color:#1d4ed8;
}

/* 날짜 */
.date {
  font-size:12px;
  color:#333;
  margin-top:-5px;
  margin-bottom:10px;
}

/* no data */
.no-data {
  background:#1f1f1f;
  border:2px solid #ff4d4d;
  padding:30px;
  border-radius:18px;
  text-align:center;
}

.no-data .title {
  font-size:22px;
  font-weight:bold;
  color:#ff4d4d;
}

.no-data .desc {
  color:#ffb4a2;
  font-size:15px;
  margin-top:6px;
}

</style>
</head>

<body>

<div class="container">

<h1>🧐 AI 트렌드 브리핑</h1>

<div class="card">

<div class="search-box">
<input id="keyword" placeholder="키워드를 입력하세요">
<button onclick="analyze()">분석</button>
</div>

<div id="result"></div>

</div>
</div>

<script>

/* =========================
   🔥 1. 안정 점수 (7일 기준 고정)
========================= */
function hashCode(str){
  let h = 0;
  for(let i=0;i<str.length;i++){
    h = Math.imul(31, h) + str.charCodeAt(i) | 0;
  }
  return Math.abs(h);
}

function score(keyword){
  const base = hashCode(keyword);
  return (base % 101); // 0~100 고정값
}

/* =========================
   🎨 2. 점수 → 색상
========================= */
function getColor(s){
  if(s <= 15) return "#0f6d3a";        // 진한 초록
  if(s <= 30) return "#3cb371";        // 초록
  if(s <= 45) return "#cddc39";        // 연두
  if(s <= 60) return "#ffd54f";        // 노랑
  if(s <= 75) return "#ff9800";        // 주황
  if(s <= 85) return "#f57c00";        // 진한 주황
  return "#e53935";                   // 빨강
}

/* =========================
   📰 고정 뉴스 (길게)
========================= */
function newsBlock(){
  const today = new Date();
  const past = new Date();
  past.setDate(today.getDate()-7);

  const fmt = (d)=> d.toISOString().split("T")[0];

  return `
  <div class="section">
    <h3>인터넷 화제성 분석</h3>
    <div class="date">최근 7일 기준 (${fmt(past)} ~ ${fmt(today)})</div>

    <p>
      해당 키워드는 최근 <b class="highlight">SNS, 유튜브, 커뮤니티</b> 전반에서
      언급량 변화가 관측되는 주제로 분석됩니다.
    </p>

    <p>
      특히 <b class="highlight">짧은 영상 콘텐츠 중심 확산</b> 패턴이 나타나며
      정보 소비 속도가 빠르게 증가하는 특징이 있습니다.
    </p>

    <p>
      검색 기반 관심도는 <b class="highlight">단기 상승 + 반복 검색 구조</b>를 보이며,
      관련 콘텐츠 생산량 또한 함께 증가하는 경향이 있습니다.
    </p>

    <p>
      종합적으로 해당 주제는 <b class="highlight">초기 관심 → 확산 단계</b> 구간에 위치할 가능성이 있습니다.
    </p>
  </div>
  `;
}

/* =========================
   👥 관심 / 질문
========================= */
function interestBlock(k){
  return `
  <div class="section">
    <h3>핵심 관심</h3>
    <p><b class="highlight">${k}</b> 관련 기본 이해, 활용 방식, 실생활 적용이 주요 관심 요소입니다.</p>
  </div>
  `;
}

function questionBlock(k){
  return `
  <div class="section">
    <h3>주요 질문</h3>
    <p>• ${k}는 왜 주목받는가?</p>
    <p>• 지금 시작해도 의미가 있는가?</p>
    <p>• 실제 수익 또는 활용 가능성은?</p>
  </div>
  `;
}

/* =========================
   🚀 메인 실행
========================= */
function analyze(){

const k = document.getElementById("keyword").value.trim();
if(!k) return alert("키워드를 입력하세요");

const s = score(k);
const color = getColor(s);

let result = `
<h2>🔍 ${k}</h2>

<div class="badge" style="background:${color}">
🔥 ${s}점
</div>

<div class="meter">
  <div class="bar" style="width:${s}%; background:${color}"></div>
</div>
`;

/* 뉴스 */
result += newsBlock();

/* 관심 */
result += interestBlock(k);

/* 질문 */
result += questionBlock(k);

/* 출력 */
document.getElementById("result").innerHTML = result;
}

</script>

</body>
</html>
