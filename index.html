<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>🧐 AI 키워드 분석기</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
  margin:0;
  background:#0f1115;
  color:white;
  font-family:Pretendard, sans-serif;
}

.container{
  max-width:1100px;
  margin:50px auto;
  padding:20px;
}

/* HEADER */
h1{
  text-align:center;
  margin-bottom:10px;
}

.subtitle{
  text-align:center;
  color:#aaa;
  margin-bottom:30px;
}

/* SEARCH */
.search-box{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

input{
  flex:1;
  padding:18px;
  border-radius:12px;
  border:none;
  background:#1a1d25;
  color:white;

  font-weight:900;
  font-size:20px;
  text-align:center;
}

button{
  padding:14px 20px;
  border:none;
  border-radius:10px;
  background:#0072ff;
  color:white;
  cursor:pointer;
  font-weight:700;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  display:none;
}

/* CARD */
.card{
  background:#1a1d25;
  padding:18px;
  border-radius:14px;
  margin-top:15px;
  display:none;
}

/* BAR */
.bar{
  width:100%;
  height:12px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  transition:0.3s;
}

/* OUTPUT */
.output{
  white-space:pre-wrap;
  line-height:1.7;
  min-height:120px;
}

canvas{
  width:100% !important;
  max-height:300px;
}

</style>
</head>

<body>

<div class="container">

  <h1>🧐 AI 키워드 분석기</h1>

  <p class="subtitle">
    최근 7일간 뉴스·SNS·커뮤니티 데이터를 AI가 분석합니다.
  </p>

  <div class="search-box">
    <input id="keyword" placeholder="" />
    <button onclick="startSearch()">분석</button>
  </div>

  <!-- DASHBOARD -->
  <div class="grid" id="dashboard">

    <div class="card">
      <h3>🔥 경쟁도</h3>
      <div class="bar"><div id="competitionBar" class="fill"></div></div>
      <p id="competitionText">0</p>
    </div>

    <div class="card">
      <h3>📈 트렌드</h3>
      <div class="bar"><div id="trendBar" class="fill"></div></div>
      <p id="trendText">0</p>
    </div>

  </div>

  <!-- 1. 인터넷 화제성 -->
  <div class="card" id="hotCard">
    <h3>📊 인터넷 화제성</h3>
    <div id="hotTopic"></div>
  </div>

  <!-- 2. 시장 구조 -->
  <div class="card" id="marketCard">
    <h3>📊 시장 구조 분석</h3>
    <div id="marketAnalysis"></div>
  </div>

  <!-- 3. AI 리포트 -->
  <div class="card" id="reportCard">
    <h3>🧠 AI 리포트 분석</h3>
    <div id="output" class="output"></div>
  </div>

</div>

<script>

function getColor(v){
  if(v >= 80) return "#ff3b3b";
  if(v >= 50) return "#ffb020";
  return "#2ecc71";
}

function animateGauge(barId, textId, value){
  let cur = 0;
  const bar = document.getElementById(barId);
  const text = document.getElementById(textId);

  const t = setInterval(()=>{
    cur += 2;
    if(cur >= value){
      cur = value;
      clearInterval(t);
    }

    bar.style.width = cur + "%";
    bar.style.background = getColor(cur);
    text.innerText = cur;
  }, 15);
}

function startSearch(){

  const keyword = document.getElementById("keyword").value;
  if(!keyword) return alert("키워드를 입력하세요");

  /* UI 표시 */
  document.getElementById("dashboard").style.display = "grid";
  document.getElementById("hotCard").style.display = "block";
  document.getElementById("marketCard").style.display = "block";
  document.getElementById("reportCard").style.display = "block";

  document.getElementById("output").innerText = "";
  document.getElementById("hotTopic").innerText = "";
  document.getElementById("marketAnalysis").innerText = "";

  const es = new EventSource(`/api/analyze?keyword=${encodeURIComponent(keyword)}`);

  es.onmessage = (e)=>{

    const d = JSON.parse(e.data);

    /* META */
    if(d.type === "meta"){

      animateGauge("competitionBar","competitionText",d.data.competition);
      animateGauge("trendBar","trendText",d.data.trendScore);

      const newsCount = d.data.newsCount || 0;

      /* 🔥 인터넷 화제성 */
      document.getElementById("hotTopic").innerText =
        `🔥 최근 7일 기준 화제 분석\n\n` +
        `• 수집된 뉴스: ${newsCount}개\n` +
        `• 경쟁도: ${d.data.competition}\n` +
        `• 트렌드 점수: ${d.data.trendScore}\n\n` +
        (d.data.competition >= 80
          ? "⚠️ 현재 매우 높은 관심 키워드입니다."
          : "ℹ️ 안정적인 관심 수준입니다.");

      /* 📊 시장 구조 */
      document.getElementById("marketAnalysis").innerText =
        `📊 시장 구조 분석\n\n` +
        `• 경쟁 수준: ${d.data.competition >= 70 ? "높음" : "보통"}\n` +
        `• 진입 난이도: ${d.data.competition >= 85 ? "어려움" : "중간"}\n` +
        `• 성장 가능성: ${d.data.trendScore >= 70 ? "높음" : "보통"}`;
    }

    /* STREAM REPORT */
    if(d.type === "chunk"){
      document.getElementById("output").innerText += d.data;
    }

    if(d.type === "done"){
      es.close();
    }

    if(d.type === "error"){
      document.getElementById("output").innerText = "⚠️ " + d.message;
    }

  };

  es.onerror = ()=>{
    document.getElementById("output").innerText = "서버 연결 실패";
    es.close();
  };
}

</script>

</body>
</html>
