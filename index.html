<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🧐 AI 트렌드 브리핑</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>

body {
  margin:0;
  background:#121212;
  color:white;
  font-family:Pretendard;
  font-size:18px;
}

.container {
  max-width:1200px;
  margin:80px auto;
  padding:30px;
}

h1 {
  text-align:center;
  font-size:2.8rem;
  margin-bottom:35px;
}

/* 카드 */
.card {
  background:white;
  color:#222;
  padding:50px;
  border-radius:28px;
}

/* 검색 */
.search-box {
  display:flex;
  gap:15px;
}

input {
  flex:1;
  padding:20px;
  font-size:18px;
  border-radius:12px;
  background:#1f1f1f;
  color:white;
  border:none;
  text-align:center;
  font-weight:700;
}

button {
  padding:20px 30px;
  font-size:18px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

/* 배지 */
.badge {
  display:inline-block;
  padding:9px 14px;
  border-radius:10px;
  color:white;
  font-weight:bold;
  margin-right:8px;
}

/* 점수 색 */
.low { background:#22c55e; }
.mid { background:#facc15; color:black; }
.high { background:#ef4444; }

/* 게이지 */
.meter {
  height:16px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  margin-top:14px;
}

.bar {
  height:100%;
  transition:0.5s;
  background:linear-gradient(90deg,#22c55e,#facc15,#ef4444);
}

/* 섹션 */
.section {
  margin-top:25px;
  padding:18px;
  border-left:5px solid #2563eb;
  background:#f8f9fa;
  border-radius:10px;
}

/* 강조 */
.highlight {
  font-weight:900;
  color:#2563eb;
}

.star {
  color:#facc15;
  font-weight:bold;
}

/* no data */
.no-data {
  background:#1f1f1f;
  border:2px solid #ff4d4d;
  padding:30px;
  border-radius:18px;
  text-align:center;
}

.no-data .title {
  font-size:22px;
  font-weight:bold;
  color:#ff4d4d;
}

.no-data .desc {
  color:#ffb4a2;
  font-size:15px;
  margin-top:6px;
}

</style>
</head>

<body>

<div class="container">

<h1>🧐 AI 트렌드 브리핑</h1>

<div class="card">

<div class="search-box">
<input id="keyword" placeholder="키워드를 입력하세요">
<button onclick="analyze()">분석</button>
</div>

<div id="result"></div>

</div>
</div>

<script>

/* =========================
   🧠 트렌드 점수 엔진
========================= */

function hash(str){
  let h = 0;
  for(let i=0;i<str.length;i++){
    h = (h * 31 + str.charCodeAt(i)) % 100;
  }
  return h;
}

/* 🔥 핵심: 같은 키워드는 비슷한 점수 유지 + 7일 미세 변화 */
function getScore(keyword){
  const base = hash(keyword);

  const now = new Date();
  const weekFactor = (now.getDate() % 7) * 2;

  let score = base + weekFactor;

  if(score > 100) score = 100;
  return score;
}

/* 점수 레벨 */
function level(score){
  if(score < 70) return "low";
  if(score < 85) return "mid";
  return "high";
}

/* 📰 화제성 분석 (항상 출력) */
function getNews(keyword){
  return `
  <div class="section">
    <h3>📰 인터넷 화제성 분석 <span class="star">★</span>
      <small style="color:#000;font-size:12px;font-weight:400;">
        (최근 7일 기준)
      </small>
    </h3>

    <p><b>${keyword}</b>는 최근 <span class="highlight">SNS / 유튜브 / 커뮤니티</span>에서  
    언급량이 증가하는 주제로 분석됩니다.</p>

    <p>특히 <b>짧은 영상 콘텐츠 중심 확산</b>이 강하며  
    검색 트렌드는 <b>완만한 상승 흐름</b>입니다 ★</p>
  </div>
  `;
}

/* 👥 핵심 관심 */
function getInterest(keyword){
  return `
  <div class="section">
    <h3>👥 핵심 관심 <span class="star">★</span></h3>
    <b>• ${keyword} 기본 개념</b><br>
    <b>• 활용 방법</b><br>
    <b>• 실생활 적용</b><br>
  </div>
  `;
}

/* ❓ 질문 */
function getQuestions(keyword){
  return `
  <div class="section">
    <h3>❓ 사람들이 궁금해하는 것 <span class="star">★</span></h3>
    <b>• ${keyword}는 왜 인기일까?</b><br>
    <b>• 지금 시작해도 될까?</b><br>
    <b>• 수익이 날까?</b><br>
  </div>
  `;
}

/* =========================
   🚀 분석 실행
========================= */

function analyze(){

const keyword = document.getElementById("keyword").value.trim();
if(!keyword) return alert("입력하세요");

const score = getScore(keyword);
const lv = level(score);

let result = `
<h2>🔍 <b>${keyword}</b></h2>

<span class="badge ${lv}">
경쟁 ${lv === "low" ? "낮음" : lv === "mid" ? "중간" : "높음"}
</span>

<span class="badge ${lv}">🔥 ${score}점</span>

<div class="meter">
<div class="bar" style="width:${score}%"></div>
</div>
`;

/* 항상 출력 구조 */
result += getNews(keyword);
result += getInterest(keyword);
result += getQuestions(keyword);

/* 출력 */
document.getElementById("result").innerHTML = result;
}

</script>

</body>
</html>
