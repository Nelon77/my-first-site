<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🧐 AI 트렌드 브리핑</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>

body {
  margin:0;
  background:#121212;
  color:white;
  font-family:Pretendard;
  font-size:18px;
}

.container {
  max-width:1200px;
  margin:80px auto;
  padding:30px;
}

h1 {
  text-align:center;
  font-size:2.8rem;
  margin-bottom:35px;
}

.card {
  background:white;
  color:#222;
  padding:50px;
  border-radius:28px;
}

/* 검색 */
.search-box {
  display:flex;
  gap:15px;
  position:relative;
}

/* 🦖 공룡 알림 */
.dino {
  position:absolute;
  top:-60px;
  left:50%;
  transform:translateX(-50%);
  background:#fff;
  color:#000;
  padding:10px 18px;
  border-radius:12px;
  font-weight:800;
  display:none;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* input */
input {
  flex:1;
  padding:20px;
  font-size:18px;
  border-radius:12px;
  background:#1f1f1f;
  color:white;
  border:none;
  text-align:center;
  font-weight:800;
}

/* 버튼 */
button {
  padding:20px 30px;
  font-size:18px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

/* 배지 */
.badge {
  display:inline-block;
  padding:10px 14px;
  border-radius:10px;
  color:white;
  font-weight:bold;
  margin-right:8px;
}

/* 점수 색상 */
.low { background:#22c55e; }
.mid { background:#facc15; color:black; }
.high { background:#ef4444; }

/* meter */
.meter {
  height:16px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  margin-top:14px;
}

.bar {
  height:100%;
  transition:0.5s;
  background:linear-gradient(90deg,#22c55e,#facc15,#ef4444);
}

/* 뉴스 */
.news {
  margin-top:20px;
  padding:20px;
  border-left:6px solid #2563eb;
  background:#eef5ff;
  border-radius:10px;
}

/* 섹션 */
.section {
  margin-top:25px;
  padding:20px;
  border-left:5px solid #ddd;
  background:#f8f9fa;
  border-radius:10px;
}

/* 별 */
.star {
  color:#facc15;
  font-weight:bold;
  margin-left:6px;
}

/* 강조 */
.blue {
  color:#2563eb;
  font-weight:900;
}

h3 { margin-bottom:10px; }

</style>
</head>

<body>

<div class="container">

<h1>🧐 AI 트렌드 브리핑</h1>

<div class="card">

<div class="search-box">

<div class="dino" id="dino">🦖 검색 완료!</div>

<input id="keyword" placeholder="키워드를 입력하세요">

<button onclick="analyze()">분석</button>

</div>

<div id="result"></div>

</div>
</div>

<script>

function score(){
  return Math.floor(Math.random()*40 + 60);
}

function level(s){
  if(s < 70) return "low";
  if(s < 85) return "mid";
  return "high";
}

/* 🦖 공룡 표시 */
function showDino(){
  const dino = document.getElementById("dino");
  dino.style.display = "block";

  setTimeout(()=>{
    dino.style.display = "none";
  }, 2500);
}

/* 🔥 점수 색상 */
function badgeColor(lv){
  if(lv === "low") return "#22c55e";
  if(lv === "mid") return "#facc15";
  return "#ef4444";
}

/* 뉴스 (확장됨) */
function news(keyword){
  return `
  <div class="news">
    <h3>📰 인터넷 화제성 분석<span class="star">★</span></h3>

    <p><b>${keyword}</b>는 현재 SNS / 유튜브 / 커뮤니티 전반에서 빠르게 확산 중입니다.</p>

    <p>검색량 증가 + 짧은 영상 콘텐츠 중심 확산이 동시에 발생하고 있으며  
    <b>트렌드 민감도가 높은 주제</b>로 분석됩니다.</p>

    <p><b>최근 7일 기준 화제성 상승 흐름</b> 📈</p>
  </div>
  `;
}

/* 관심 */
function interest(keyword){
  return `
  <div class="section">
    <h3>👥 핵심 관심<span class="star">★</span></h3>
    <b>• ${keyword} 활용 방법</b><br>
    <b>• 수익 구조 분석</b><br>
    <b>• 시장 전망</b><br>
  </div>
  `;
}

/* 질문 */
function questions(){
  return `
  <div class="section">
    <h3>❓ 사람들이 궁금해하는 것<span class="star">★</span></h3>
    <b>• 지금 시작해도 될까?</b><br>
    <b>• 돈이 될까?</b><br>
    <b>• 경쟁은 어떤가?</b><br>
  </div>
  `;
}

/* 분석 */
function analyze(){

const keyword = document.getElementById("keyword").value.trim();
if(!keyword) return alert("입력하세요");

/* 🦖 공룡 먼저 */
showDino();

const s = score();
const lv = level(s);
const color = badgeColor(lv);

const result = document.getElementById("result");

setTimeout(()=>{

result.innerHTML = `
<h2>🔍 <b>${keyword}</b></h2>

<span class="badge" style="background:${color}">
🔥 ${s}점
</span>

<div class="meter">
<div class="bar" style="width:${s}%"></div>
</div>

${news(keyword)}
${interest(keyword)}
${questions()}
`;

}, 300);

}

</script>

</body>
</html>
