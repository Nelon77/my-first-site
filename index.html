<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🧐 AI 트렌드 브리핑</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>

body {
  margin:0;
  background:#121212;
  color:white;
  font-family:Pretendard;
}

.container {
  max-width:1200px;
  margin:80px auto;
  padding:30px;
}

h1 {
  text-align:center;
  font-size:2.8rem;
  margin-bottom:35px;
}

/* 카드 */
.card {
  background:white;
  color:#222;
  padding:50px;
  border-radius:28px;
}

/* 검색 */
.search-box {
  display:flex;
  gap:15px;
}

input {
  flex:1;
  padding:20px;
  font-size:18px;
  border-radius:12px;
  background:#1f1f1f;
  color:white;
  border:none;
  text-align:center;
  font-weight:700;
}

/* 🔥 자동완성 / 크롬 추천 제거 */
input:-webkit-autofill {
  box-shadow: 0 0 0px 1000px #1f1f1f inset !important;
  -webkit-text-fill-color: white !important;
}

button {
  padding:20px 30px;
  font-size:18px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

/* 배지 */
.badge {
  display:inline-block;
  padding:10px 14px;
  border-radius:10px;
  color:white;
  font-weight:bold;
  margin-right:8px;
}

/* 🎯 0~100 완전 정밀 색상 매핑 */
.c0 { background:#0b3d0b; }     /* 0~15 진한 초록 */
.c1 { background:#3cb371; }     /* 16~30 연두 */
.c2 { background:#f1e05a; color:black; } /* 31~45 노랑 */
.c3 { background:#f4c430; color:black; } /* 46~60 노랑-주황 */
.c4 { background:#ff9800; }     /* 61~75 주황 */
.c5 { background:#ff6f00; }     /* 76~85 진한 주황 */
.c6 { background:#e53935; }     /* 86~100 빨강 */

.meter {
  height:16px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  margin-top:14px;
}

.bar {
  height:100%;
  transition:0.5s;
}

.section {
  margin-top:25px;
  padding:18px;
  border-left:5px solid #2563eb;
  background:#f8f9fa;
  border-radius:10px;
}

.section h3 {
  margin-bottom:10px;
}

.star {
  color:#FFD700;
  font-weight:bold;
}

.highlight {
  color:#2563eb;
  font-weight:900;
}

/* no data */
.no-data {
  background:#1f1f1f;
  border:2px solid #ff4d4d;
  padding:30px;
  border-radius:18px;
  text-align:center;
}

.no-data .title {
  font-size:22px;
  font-weight:bold;
  color:#ff4d4d;
}

.no-data .desc {
  color:#ffb4a2;
  font-size:15px;
  margin-top:6px;
}

</style>
</head>

<body>

<div class="container">

<h1>🧐 AI 트렌드 브리핑</h1>

<div class="card">

<div class="search-box">
<input id="keyword" autocomplete="off" placeholder="키워드를 입력하세요">
<button onclick="analyze()">분석</button>
</div>

<div id="result"></div>

</div>
</div>

<script>

/* 점수 */
function score(){
  return Math.floor(Math.random()*100);
}

/* 🎯 색상 매핑 */
function getColorClass(score){
  if(score <= 15) return "c0";
  if(score <= 30) return "c1";
  if(score <= 45) return "c2";
  if(score <= 60) return "c3";
  if(score <= 75) return "c4";
  if(score <= 85) return "c5";
  return "c6";
}

/* 날짜 */
function getDate(){
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

/* 🔥 화제성 (풍부 + 과하지 않게) */
function getNews(keyword){

return `
<div class="section">
<h3>📰 인터넷 화제성 분석 <span class="star">★</span></h3>

<p><b>${keyword}</b> 관련 키워드는 최근 <span class="highlight">SNS, 유튜브, 커뮤니티</span>에서
점진적으로 언급량이 증가하고 있습니다.</p>

<p><b>최근 7일(${getDate()} 기준)</b> 트렌드 분석 결과,
해당 주제는 <b>검색 관심도 상승 구간</b>에 위치합니다.</p>

<p>특히 <b>짧은 영상 콘텐츠 중심 확산</b>이 주요 특징이며,
관련 정보 소비가 빠르게 증가하는 패턴이 확인됩니다 ★</p>
</div>
`;
}

/* 핵심 관심 */
function getInterest(keyword){
return `
<div class="section">
<h3>👥 핵심 관심 <span class="star">★</span></h3>

<b>• 관련 활용 분야</b><br>
<b>• 실생활 적용 사례</b><br>
<b>• 트렌드 확장 가능성</b><br>
</div>
`;
}

/* 질문 */
function getQuestions(){
return `
<div class="section">
<h3>❓ 사람들이 궁금해하는 것 <span class="star">★</span></h3>

<b>• 지금 시작해도 늦지 않을까?</b><br>
<b>• 실제 수익이 가능한가?</b><br>
<b>• 경쟁 강도는 어떤가?</b><br>
</div>
`;
}

/* 키워드 강조 제거 함수 */
function cleanText(text, keyword){
  return text.replaceAll(keyword, `<b>${keyword}</b>`);
}

function analyze(){

const keyword = document.getElementById("keyword").value.trim();
if(!keyword) return alert("입력하세요");

const s = score();
const c = getColorClass(s);

let result = `
<h2>🔍 ${keyword}</h2>

<span class="badge ${c}">🔥 ${s}점</span>

<div class="meter">
<div class="bar ${c}" style="width:${s}%"></div>
</div>
`;

result += getNews(keyword);
result += getInterest(keyword);
result += getQuestions();

document.getElementById("result").innerHTML = result;

}

</script>

</body>
</html>
